const GRAMMAR = [
  { id:'sp', slug:'sp', title:'Simple Present', level:'A1', cls:5, cat:'Zeiten',
    desc:'Gewohnheiten, Fakten, regelmäßige Handlungen',
    exDE:['Das Simple Present benutzt du für Dinge, die regelmäßig passieren oder immer wahr sind: Gewohnheiten, Hobbys, Fakten.',
           'Für I/you/we/they nimmst du die Grundform des Verbs. Für he/she/it hängst du -s oder -es an.',
           'Verneinung: don\'t (I/you/we/they) + Grundform oder doesn\'t (he/she/it) + Grundform.',
           'Fragen: Do / Does + Subjekt + Grundform?'],
    exEN:['Use the Simple Present for habits, routines and general truths.',
           'For he/she/it: add -s or -es. For I/you/we/they: use the base form.',
           'Negatives: don\'t / doesn\'t + base form. Questions: Do / Does + subject + base form?'],
    examples:[
      {en:'I play football every Saturday.',de:'Ich spiele jeden Samstag Fußball.'},
      {en:'She reads books in the evening.',de:'Sie liest abends Bücher.'},
      {en:'They don\'t like pizza.',de:'Sie mögen keine Pizza.'},
      {en:'Does he speak French?',de:'Spricht er Französisch?'},
      {en:'Water boils at 100 degrees.',de:'Wasser kocht bei 100 Grad.'}
    ],
    mistakes:[
      {wrong:'She play tennis.',correct:'She plays tennis.',tip:'Bei he/she/it immer -s ans Verb!'},
      {wrong:'He don\'t like cats.',correct:'He doesn\'t like cats.',tip:'Bei he/she/it "doesn\'t", nicht "don\'t".'},
      {wrong:'Does she plays football?',correct:'Does she play football?',tip:'Nach does/doesn\'t Grundform – kein -s!'}
    ],
    exercises:[
      { id:'sp-mc-1', type:'mc', diff:1, title:'Level 1 – Start: Richtige Form wählen',
        questions:[
          {q:'Tom ___ football every day.',opts:['play','plays','playing','is play'],correct:1,exp:'Tom = he/she/it → plays'},
          {q:'We ___ to school by bus.',opts:['goes','going','go','goed'],correct:2,exp:'We → Grundform: go'},
          {q:'She ___ her room on Saturdays.',opts:['clean','cleans','is cleaning','cleaned'],correct:1,exp:'she → cleans'},
          {q:'They ___ TV in the evenings.',opts:['watches','watch','is watching','watchs'],correct:1,exp:'They → Grundform: watch'},

      { id:'sp-fg-1', type:'fg', diff:1, title:'Level 1 – Start: Lücken füllen',

          {pre:'I',suf:'football on Fridays. (play)',ans:'play',hint:'I → Grundform'},
          {pre:'She',suf:'her teeth every morning. (brush)',ans:'brushes',hint:'she → +es'},
          {pre:'We',suf:'in London. (live)',ans:'live',hint:'we → Grundform'},
          {pre:'He',suf:'to music in his room. (listen)',ans:'listens',hint:'he → +s'},
          {pre:'They',suf:'a dog. (have)',ans:'have',hint:'they → have (nicht haves!)'}

          {q:'I ___ eat meat. I\'m a vegetarian.',opts:['doesn\'t','not','don\'t','isn\'t'],correct:2,exp:'I → don\'t + Grundform'}

      { id:'sp-wo-1', type:'wo', diff:3, title:'Level 3 – Challenge: Sätze bauen',
        items:[
          {phrases:['I','usually','have breakfast','at half seven.'],correct:'I usually have breakfast at half seven.',hint:'Zeitangaben stehen oft am Ende.'},
          {phrases:['Anna',"doesn't do",'sport','on school mornings.'],correct:"Anna doesn't do sport on school mornings.",hint:'Verneinung: doesn\'t + Grundform'},
          {phrases:['What','do you','do','after school?'],correct:'What do you do after school?',hint:'W-Frage: Fragewort + Hilfsverb + Subjekt + Verb'},
          {phrases:['They','train','twice','every week.'],correct:'They train twice every week.'}

  { id:'past', slug:'past', title:'Simple Past', level:'A2', cls:6, cat:'Zeiten',

           'Unregelmäßige Verben haben eigene Formen: go→went, see→saw, have→had. Diese musst du auswendig lernen!',
           'Verneinung: didn\'t + Grundform (alle Personen). Fragen: Did + Subjekt + Grundform?'],
    exEN:['Use the Simple Past for completed actions in the past. Time markers: yesterday, last week, ago.',
           'Regular verbs: add -ed. Irregular verbs: learn them by heart (go→went, see→saw).',
           'Negatives: didn\'t + base form. Questions: Did + subject + base form?'],
    examples:[
      {en:'I played football yesterday.',de:'Ich habe gestern Fußball gespielt.'},

      {en:'Did you see the film?',de:'Hast du den Film gesehen?'},
      {en:'We had a great time at the party.',de:'Wir hatten eine tolle Zeit auf der Party.'}
    ],
    mistakes:[
      {wrong:'I goed to the park.',correct:'I went to the park.',tip:'go ist unregelmäßig: go → went.'},
      {wrong:'She didn\'t went home.',correct:'She didn\'t go home.',tip:'Nach didn\'t immer Grundform: go, nicht went.'},
      {wrong:'Did he played football?',correct:'Did he play football?',tip:'Nach did immer Grundform: play, nicht played.'}
    ],
    exercises:[
      { id:'past-mc-1a', type:'mc', diff:1, title:'Level 1.1 – Regelmäßige Verben (+ed)',
        questions:[
          {q:'Yesterday, I ___ a good film on TV.',opts:['watch','watched','watching','watches'],correct:1,exp:'Regelmäßig: watch + ed = watch<strong>ed</strong>.'},
          {q:'They ___ football in the park last Saturday.',opts:['play','plays','playing','played'],correct:3,exp:'Regelmäßig: play + ed = play<strong>ed</strong>.'},

          {q:'He ___ for his test all evening.',opts:['study','studies','studying','studied'],correct:3,exp:'study → studi<strong>ed</strong> (-y wird zu -ied).'},
          {q:'We ___ to a new flat last year.',opts:['move','moves','moving','moved'],correct:3,exp:'move + d = mov<strong>ed</strong> (endet auf -e, nur +d).'}
        ]
      },
      { id:'past-mc-1b', type:'mc', diff:1, title:'Level 1.2 – Unregelmäßige Verben',
        questions:[
          {q:'She ___ to school by bus last Monday.',opts:['goed','goes','went','go'],correct:2,exp:'go ist unregelmäßig: go → went.'},
          {q:'We ___ pizza for lunch yesterday.',opts:['eat','eated','ate','eaten'],correct:2,exp:'eat ist unregelmäßig: eat → ate.'},
          {q:'He ___ his homework last night.',opts:['do','does','did','doed'],correct:2,exp:'do ist unregelmäßig: do → did.'},
          {q:'I ___ a great film last week.',opts:['seed','saw','see','seen'],correct:1,exp:'see ist unregelmäßig: see → saw.'},
          {q:'She ___ me a present for my birthday.',opts:['gived','gives','given','gave'],correct:3,exp:'give ist unregelmäßig: give → gave.'}
        ]

      { id:'past-mc-2', type:'mc', diff:2, title:'Level 2 – Training: Verneinungen & Fragen',

          {q:'___ you watch the match last night?',opts:['Do','Does','Did','Were'],correct:2,exp:'Vergangenheit Frage: Did.'},
          {q:'I ___ my bag this morning. (find)',opts:['finded','found','find','finds'],correct:1,exp:'find ist unregelmäßig: find → found.'},
          {q:'They ___ lunch together yesterday.',opts:['don\'t have','doesn\'t have','didn\'t have','not had'],correct:2,exp:'didn\'t + Grundform.'},
          {q:'___ he lose his keys?',opts:['Do','Does','Did','Was'],correct:2,exp:'Vergangenheit Frage: Did.'}
        ]
      },
      { id:'past-wo-1', type:'wo', diff:3, title:'Level 3 – Challenge: Sätze im Simple Past',

          {phrases:['She',"didn't come",'to the party','last night.'],correct:"She didn't come to the party last night.",hint:'didn\'t + Grundform (come, nicht came!)'},
          {phrases:['Where','did you go','last summer?'],correct:'Where did you go last summer?',hint:'W-Frage: Where + did + Subjekt + Grundform'},
          {phrases:['She','bought','a new phone','yesterday.'],correct:'She bought a new phone yesterday.',hint:'bought = Simple Past von buy'}
        ]
      }
    ]
  },
  { id:'wo', slug:'wo', title:'Wortstellung im Englischen', level:'A1', cls:5, cat:'Satzbau',

    exDE:['Im Englischen gilt fast immer: Subjekt (S) – Verb (V) – Objekt (O). Diese Reihenfolge ist unveränderlich!',
           'Zeitangaben stehen am Anfang oder am Ende des Satzes, nie in der Mitte.',
           'In Fragen kommt das Hilfsverb vor das Subjekt: Do you...? / Can she...?',
           'Verneinungen direkt nach dem Hilfsverb: She doesn\'t... / They didn\'t...'],
    exEN:['English word order is fixed: Subject – Verb – Object.',
           'Time adverbials go at the beginning or end of the sentence.',
           'Questions: auxiliary verb before subject. Negatives: after the auxiliary.'],
    examples:[
      {en:'Tom reads a book every evening.',de:'Tom liest jeden Abend ein Buch.'},
      {en:'My sister plays the piano.',de:'Meine Schwester spielt Klavier.'},
      {en:'Do you like football?',de:'Magst du Fußball?'},
      {en:'She doesn\'t watch TV on Mondays.',de:'Sie schaut montags kein TV.'},
      {en:'Yesterday, we visited the museum.',de:'Gestern besuchten wir das Museum.'}
    ],
    mistakes:[
      {wrong:'I like very much chocolate.',correct:'I like chocolate very much.',tip:'Objekt direkt nach dem Verb – "very much" kommt danach.'},
      {wrong:'She every day plays tennis.',correct:'She plays tennis every day.',tip:'"every day" am Ende, nicht zwischen Subjekt und Verb.'},
      {wrong:'Why she is late?',correct:'Why is she late?',tip:'In Fragen: Verb vor Subjekt!'}
    ],
    exercises:[
      { id:'wo-mc-1', type:'mc', diff:1, title:'Level 1 – Start: Richtigen Satz wählen',
        questions:[
          {q:'Welcher Satz ist richtig?',opts:['Tom every day football plays.','Tom plays football every day.','Every day Tom football plays.','Football Tom plays every day.'],correct:1,exp:'S (Tom) – V (plays) – O (football) – Zeit (every day).'},
          {q:'Welcher Satz ist richtig?',opts:['Does she like pizza?','She does like pizza?','Like she does pizza?','Pizza does she like?'],correct:0,exp:'Fragen: Does + S + Grundform + Objekt.'},
          {q:'Welcher Satz ist richtig?',opts:['I very much like ice cream.','I like very much ice cream.','I like ice cream very much.','Ice cream I like very much.'],correct:2,exp:'"Very much" steht nach dem Objekt.'},
          {q:'Welcher Satz ist richtig?',opts:['She doesn\'t eat meat.','She meat doesn\'t eat.','She eat doesn\'t meat.','Meat she doesn\'t eat.'],correct:0,exp:'S + doesn\'t + Grundform + Objekt.'}
        ]
      },
      { id:'wo-wo-1', type:'wo', diff:2, title:'Level 2 – Training: Satzbausteine ordnen',
        items:[
          {phrases:['He','reads books','every morning.'],correct:'He reads books every morning.',hint:'S – V – O – Zeit'},

          {phrases:['Yesterday','we visited','the museum.'],correct:'Yesterday we visited the museum.',hint:'Zeitangabe kann am Anfang stehen!'}
        ]
      }
    ]

           'Bildung: am / is / are + Verb + -ing. Signalwörter: now, at the moment, right now, Look!, Listen!',

    examples:[

    exercises:[

const READING = [
  { id:'r1', title:'My New School', level:'A1', type:'E-Mail',
    vocab:[{en:'arrive',de:'ankommen',pos:'v',example:'The train arrives at eight o\'clock.'},{en:'timetable',de:'Stundenplan',example:'My timetable has five lessons a day.'},{en:'corridor',de:'Flur',example:'We wait in the corridor before the lesson.'},{en:'canteen',de:'Mensa',example:'I eat lunch in the school canteen.'},{en:'nervous',de:'nervös',example:'Sophie was nervous on her first day.'}],
    text:`Hi Emma,\n\nHow are you? I'm writing to tell you about my new school. It's called Hillside Academy.\n\nMy first day was last Monday. I was really nervous, but my new teacher, Mr Brown, is very friendly.\n\nThe school is quite big. There are 800 pupils and 50 teachers. There is a sports hall, a library and a big canteen.\n\nMy timetable is great. I have English, Maths, Science, Art and PE. My favourite subject is Art.\n\nI eat lunch in the canteen. The food is really good! Today I had pasta and a salad.\n\nSchool finishes at half past three. Then I take the bus home. It takes about 20 minutes.\n\nWrite soon!\nSophie`,
    questions:[
      {q:"How does Sophie feel about her new school?",type:'mc',opts:["She hates it and misses her old school.","She is nervous, but she likes what she sees.","She is completely relaxed and happy.","She finds it boring and too big."],ans:"She is nervous, but she likes what she sees.",exp:"Sophie war nervös, aber: netter Lehrer, guter Stundenplan, leckeres Essen – sie findet die Schule gut.",gist:true},
      {q:'Sophie was happy and relaxed on her first day.',type:'tf',ans:'false',exp:'Falsch – sie war nervös (nervous).'},
      {q:'How many pupils does the school have?',type:'mc',opts:['500','800','1000','600'],ans:'800',exp:'"There are 800 pupils."'},

  { id:'r2', title:'My Best Friend', level:'A1', type:'Blogpost',
    vocab:[{en:'funny',de:'lustig',example:'My best friend is really funny – she always makes me laugh.'},{en:'kind',de:'nett / freundlich',example:'Our teacher is very kind and helps everyone.'},{en:'always',de:'immer',example:'I always do my homework after dinner.'},{en:'sometimes',de:'manchmal',example:'We sometimes go to the park at the weekend.'},{en:'neighbourhood',de:'Nachbarschaft',example:'Lena lives in my neighbourhood, just three houses away.'}],
    text:`This is a short text about my best friend, Lena.\n\nLena is twelve years old. She lives in my neighbourhood, just three houses away. We go to the same school and we are in the same class.\n\nLena is tall and has long brown hair. She always wears colourful clothes. Her favourite colour is purple.\n\nLena loves reading books and listening to music. She also plays the guitar very well. She practises every evening.\n\nWe usually spend our free time together. On Saturdays, we go to the swimming pool or to the park. Sometimes we watch films.\n\nLena is really funny and kind. She always helps me with my maths homework! I think she is the best friend you can have.`,

  { id:'r3', title:'A Day in London', level:'A2', type:'Tagebucheintrag',
    vocab:[{en:'Thames',de:'Themse',example:'The River Thames flows through the centre of London.'},{en:'double-decker bus',de:'Doppeldeckerbus',example:'We got on a red double-decker bus to see the city.'},{en:'queue',de:'anstehen',pos:'v',example:'We had to queue for 20 minutes at the museum.'},{en:'stunning',de:'atemberaubend',example:'The view from the London Eye was absolutely stunning.'},{en:'exhausted',de:'erschöpft',example:'After the long day, we were completely exhausted.'}],
    text:`Tuesday, 23rd July\n\nWhat an amazing day! We got up early this morning because we had a lot planned.\n\nFirst, we took the underground (the Tube) to Tower Bridge. It was really busy. Tower Bridge is incredible – it's right on the River Thames.\n\nAfter that, we visited the Tower of London. We had to queue for about 20 minutes, but it was worth it. We saw the Crown Jewels. A Beefeater guard gave us a tour.\n\nFor lunch, we had fish and chips near the Thames. It was delicious! Then we got on a double-decker bus and went to Buckingham Palace. We saw the Changing of the Guard.\n\nIn the evening, we went on the London Eye. From the top, you can see the whole city. It was breathtaking.\n\nI was completely exhausted when we got back to the hotel at ten o'clock.`,
    questions:[
      {q:"How does the writer feel at the end of the day?",type:'mc',opts:["Bored – they did too little.","Exhausted but very happy.","Disappointed because it rained.","Angry because the queues were too long."],ans:"Exhausted but very happy.",exp:"\"What an amazing day!\" – aber: \"I was completely exhausted when we got back.\"",gist:true},
      {q:'They had to wait in a queue at the Tower of London.',type:'tf',ans:'true',exp:'"We had to queue for about 20 minutes."'},
      {q:'What did they eat for lunch?',type:'mc',opts:['pizza','a sandwich','fish and chips','a burger'],ans:'fish and chips',exp:'"For lunch, we had fish and chips."'},
      {q:'They saw the Changing of the Guard at Tower Bridge.',type:'tf',ans:'false',exp:'Falsch – sie sahen es bei Buckingham Palace.'},
      {q:'What time did they get back to the hotel?',type:'mc',opts:['eight o\'clock','nine o\'clock','ten o\'clock','eleven o\'clock'],ans:'ten o\'clock',exp:'"when we got back to the hotel at ten o\'clock"'}
    ]
  },
  { id:'r4', title:'My Digital Life', level:'A2', type:'Blogeintrag',
    vocab:[{en:'addicted',de:'süchtig',example:'Some people are addicted to their smartphones.'},{en:'limit',de:'begrenzen',pos:'v',example:'My parents limit my screen time to two hours a day.'},{en:'concentrate',de:'sich konzentrieren',pos:'v',example:'I can\'t concentrate when the TV is on.'},{en:'admit',de:'zugeben',pos:'v',example:'I have to admit that I check my phone too often.'},{en:'balance',de:'Balance',example:'It is important to have a good balance between online and offline time.'}],
    text:`Hi, my name is Felix and I'm thirteen years old. Today I want to write about digital life.\n\nI spend a lot of time on my phone and laptop. In the evenings, I usually watch videos online or play games with my friends.\n\nMy parents say I am on my phone too much. They have set a screen time limit of two hours on school days. At first, I was really annoyed. But now I think they are right. When I used my phone all evening, I couldn't concentrate at school.\n\nNow I try to have a good balance. I turn off my phone when I'm doing homework. I also try to spend time offline – I go cycling, meet friends, or read a book.\n\nI have to admit that sometimes I still check my phone too often. But I think it's important to know when to put it away.`,
    questions:[
      {q:"What is Felix's main message in his text?",type:'mc',opts:["Phones are always bad and should be banned.","A good balance with screen time is important.","Parents should not set screen time limits.","He plays video games all day and loves it."],ans:"A good balance with screen time is important.",exp:"\"I think it's important to know when to put it away.\" – Schlussgedanke des Textes.",gist:true},
      {q:"How long is Felix's screen time limit on school days?",type:'mc',opts:['one hour','two hours','three hours','no limit'],ans:'two hours',exp:'"a screen time limit of two hours on school days"'},
      {q:'When does Felix turn off his phone?',type:'mc',opts:['at dinner time','when doing homework','after ten o\'clock','never'],ans:'when doing homework',exp:'"I turn off my phone when I\'m doing homework."'},
      {q:'Felix thinks his parents were right to set a limit.',type:'tf',ans:'true',exp:'"now I think they are right."'}
    ]
  },
  { id:'r5', title:'Emma\'s Hobby', level:'A1', topic:'Free Time & Hobbies',
    vocab:[{en:'hobby',de:'das Hobby',example:'My hobby is collecting stamps from different countries.'},{en:'collect',de:'sammeln',pos:'v',example:'Emma collects stamps from over 40 countries.'},{en:'stamps',de:'Briefmarken',example:'I found some old stamps at the market last Saturday.'},{en:'proud',de:'stolz',example:'I am very proud of my stamp collection.'},{en:'special',de:'besonders',example:'My favourite stamp is special because it comes from Japan.'}],
    text:`My name is Emma and I have a great hobby. I collect stamps. I have stamps from over 40 countries! My favourite stamp is from Japan – it has a beautiful picture of Mount Fuji.
Every Saturday I go to the market with my dad. Sometimes we find old stamps there. Last week I found a stamp from 1965. It was very cheap – only 50 cents!
My best friend Lena doesn\'t collect stamps. She thinks it\'s boring. But I think it\'s really interesting because you can learn a lot about different countries. My teacher says I\'m very creative. I\'m very proud of my collection.`,

      {q:'How many countries does Emma have stamps from?',type:'mc',opts:['more than 20','more than 30','more than 40','more than 50'],ans:'more than 40'},
      {q:'Emma\'s favourite stamp is from Japan.',type:'tf',ans:'true'},

      {q:'Where does Emma go every Saturday?',type:'mc',opts:['to the library','to the park','to the market','to school'],ans:'to the market'}

  { id:'r6', title:'A Visit to the Zoo', level:'A1', topic:'Animals & Places',
    vocab:[{en:'giraffe',de:'die Giraffe',example:'The biggest giraffe was almost six metres tall!'},{en:'enclosure',de:'das Gehege',example:'The giraffes were in a large enclosure near the entrance.'},{en:'feed',de:'füttern',pos:'v',example:'We could feed the giraffes leaves through the fence.'},{en:'scary',de:'gruselig',example:'Tom thought the spiders in the reptile house were scary.'},{en:'amazing',de:'unglaublich',example:'It was amazing to see the giraffes so close up!'}],
    text:`Last Sunday, our class went to the zoo. It was our end-of-year trip. We travelled by coach and it took about one hour.
At the zoo, we saw lots of animals. My favourite animals were the giraffes. They are so tall – the biggest one was almost six metres! We could feed them leaves through the fence. It was amazing.
We also saw elephants, lions and penguins. The penguins were really funny – they ran very fast on their little legs! Tom from my class thought the spiders in the reptile house were scary, but I thought they were interesting.
At lunchtime we ate our sandwiches near the lake. We saw some ducks and a heron. On the way home, almost everyone fell asleep on the coach. It was a brilliant day!`,
    questions:[
      {q:"What was the general mood of the zoo trip?",type:'mc',opts:["Disappointing – the animals were boring.","Scary – especially the reptile house.","Fun and exciting for everyone.","Too tiring – nobody enjoyed it."],ans:"Fun and exciting for everyone.",exp:"\"It was a brilliant day!\" – so endet der Text.",gist:true},
      {q:'How tall was the biggest giraffe?',type:'mc',opts:['four metres','five metres','almost six metres','seven metres'],ans:'almost six metres'},
      {q:'The students could feed the giraffes.',type:'tf',ans:'true'},
      {q:'Tom thought the spiders were interesting.',type:'tf',ans:'false'},
      {q:'What did they do at lunchtime?',type:'mc',opts:['bought ice cream','ate sandwiches near the lake','visited the gift shop','watched a show'],ans:'ate sandwiches near the lake'}
    ]
  },
  { id:'r7', title:'A Weekend in Berlin', level:'A2', topic:'Travel & Cities',
    vocab:[{en:'capital',de:'die Hauptstadt',example:'Berlin is the capital of Germany.'},{en:'memorial',de:'das Denkmal',example:'The Holocaust Memorial in Berlin is very moving.'},{en:'incredible',de:'unglaublich',example:'The Brandenburg Gate is an incredible landmark.'},{en:'exhausted',de:'erschöpft'},{en:'recommend',de:'empfehlen',pos:'v',example:'I would definitely recommend visiting Berlin to everyone.'}],
    text:`Last weekend, my family and I visited Berlin, the capital of Germany. We went by train and arrived on Friday evening. Our hotel was right in the centre of the city, which was perfect.
On Saturday morning, we visited the Brandenburg Gate. It\'s one of the most famous landmarks in Europe and it was really impressive. Then we walked to the Holocaust Memorial. It was a very moving experience – there are 2,711 concrete blocks of different heights and you can walk between them. I felt very small and emotional.
In the afternoon, we took a boat trip on the River Spree. From the boat, we could see lots of important buildings. In the evening, we ate at a Vietnamese restaurant near our hotel. The food was delicious.
On Sunday, we visited Museum Island. There are five world-famous museums there! We could only go to two because we didn\'t have enough time. My favourite was the Pergamon Museum. By Sunday evening, we were completely exhausted but very happy. I would definitely recommend Berlin to everyone!`,
    questions:[
      {q:"How did the family feel about their weekend in Berlin?",type:'mc',opts:["Disappointed – the museums were closed.","Exhausted and unhappy.","Very happy, despite being tired.","Bored – Berlin was too quiet."],ans:"Very happy, despite being tired.",exp:"\"completely exhausted but very happy\" – vorletzter Satz.",gist:true},
      {q:'The Holocaust Memorial has 2,711 concrete blocks.',type:'tf',ans:'true'},
      {q:'What did they do on Saturday afternoon?',type:'mc',opts:['visited a museum','went shopping','took a boat trip','watched a film'],ans:'took a boat trip'},
      {q:'They visited all five museums on Museum Island.',type:'tf',ans:'false'},
      {q:'Overall, the family had a good time in Berlin.',type:'tf',ans:'true'}
    ]
  },
  { id:'r8', title:'My Exchange Student', level:'A2', topic:'People & Friendship',
    vocab:[{en:'exchange student',de:'der Austauschschüler',example:'Marcus is an exchange student from Manchester, England.'},{en:'nervous',de:'nervös'},{en:'homesick',de:'Heimweh haben'},{en:'settle in',de:'sich eingewöhnen',pos:'v',example:'After the first week, Marcus started to settle in at school.'},{en:'grateful',de:'dankbar',example:'I am really grateful that Marcus came to stay with us.'}],
    text:`Three weeks ago, an exchange student called Marcus came to stay with us. He\'s from Manchester, England, and he\'s going to be here for six weeks.
When he first arrived, he seemed quite nervous. He didn\'t say much at dinner and I think he was a little homesick. My mum made his favourite food – pasta – to help him feel at home.
After the first week, Marcus started to settle in. He came to school with me and made some friends quickly. His German isn\'t perfect, but everyone says his accent is funny in a nice way! He plays in our school football team now and he\'s really good.
At weekends, we show him around our town. Last Saturday, we cycled to the lake and had a barbecue. Marcus said it was one of the best days of his life. He also taught us some English slang words – but I can\'t write them here because my teacher would not be happy!
I\'m really grateful that Marcus came to stay with us. I think we\'ve become good friends, and I\'m already planning to visit him in Manchester next summer.`,
    questions:[
      {q:"How has the relationship between the narrator and Marcus developed?",type:'mc',opts:["They still do not know each other well.","Marcus is homesick and unhappy.","They have become good friends.","The narrator finds Marcus difficult to live with."],ans:"They have become good friends.",exp:"\"I think we've become good friends.\" – vorletzter Absatz.",gist:true},
      {q:'Marcus felt very comfortable when he first arrived.',type:'tf',ans:'false'},
      {q:'What did Marcus\'s mum cook to help him feel at home?',type:'mc',opts:['fish and chips','pasta','pizza','soup'],ans:'pasta'},
      {q:'Marcus plays in the school football team.',type:'tf',ans:'true'},
      {q:'What is the narrator planning to do next summer?',type:'mc',opts:['come to England','visit Manchester','go to London','move to England'],ans:'visit Manchester'}
    ]
  }

const SK = 'soul_english_v1';
let P = (() => {
  try { return JSON.parse(localStorage.getItem(SK)) || defP(); } catch(e){ return defP(); }
})();
function defP(){
  return {grammar:{}, vocab:{}, irreg:[], reading:[], writing:[], listening:[], badges:[], streak:0, lastDate:'', xp:0, errors:{}};
}
function save(){ localStorage.setItem(SK, JSON.stringify(P)); }
function checkStreak(){
  const today = new Date().toISOString().slice(0,10);
  if(P.lastDate === today) return;
  const yest = new Date(Date.now()-86400000).toISOString().slice(0,10);
  P.streak = P.lastDate === yest ? P.streak + 1 : 1;
  P.lastDate = today;
  save();
}
function addXP(n){ P.xp = (P.xp||0) + n; save(); }
function grammarStats(){
  return { done: Object.values(P.grammar).filter(g=>g.completed).length, total: GRAMMAR.length };
}
function checkBadges(){
  const add = id => { if(!P.badges.includes(id)){ P.badges.push(id); save(); } };
  const gs = grammarStats();
  if(gs.done >= 1) add('grammar-starter');
  if(gs.done >= 5) add('grammar-pro');
  if(Object.values(P.vocab).some(v=>v.tested)) add('vocab-hero');
  if(P.reading.length >= 1) add('reading-detective');
  if(P.listening.length >= 1) add('listening-pro');
  if(P.writing.length >= 1) add('writing-explorer');
  if(P.irreg.length >= 20) add('irreg-champ');
  if(P.grammar['past'] && P.grammar['past'].completed) add('simple-past-master');
  if(P.streak >= 3) add('streak-3');
  const gs2 = grammarStats();
  if(gs2.done>=1 && Object.values(P.vocab).some(v=>v.tested) && P.reading.length>=1 && P.writing.length>=1) add('all-rounder');
}

  checkStreak();
  document.getElementById('app').innerHTML = render(_state);
  document.querySelectorAll('.nav-link').forEach(el=>{

    el.classList.toggle('active', sec === section);

  window.scrollTo(0,0);
  bindAll();

  const fbtn = document.getElementById('ts-float-btn');
  if(fbtn) fbtn.remove();
  if(_ts && _ts.items && _ts.items.length > 0 && !_ts.done && _ts._cur !== undefined && section !== 'timed-session' && section !== 'home'){
    const btn = document.createElement('button');

function getWeakAreas(){
  const errors = P.errors || {};
  return Object.entries(errors)
    .map(([key, count]) => {
      const [type, id] = key.split(':');
      let label = '', link = '';
      if(type === 'grammar'){
        const t = GRAMMAR.find(g=>g.id===id);
        label = t ? '📚 ' + t.title : ''; link = `go('grammar-topic','${id}')`;
      } else if(type === 'vocab'){
        const t = VOCAB.find(v=>v.id===id);
        label = t ? '🔤 ' + t.title : ''; link = `go('vocab-topic','${id}')`;
      }
      return {label, count, link};
    })
    .filter(a => a.label)
    .sort((a,b) => b.count - a.count)
    .slice(0, 3);
}

function renderWortarten(){
  const sections=[
    {id:'noun',emoji:'🧩',title:'Nouns – Nomen/Substantive',color:'#EFF6FF',border:'#BFDBFE',accent:'#1E40AF',
     intro:'Nomen bezeichnen Personen, Tiere, Dinge oder abstrakte Begriffe. Im Englischen werden Nomen <strong>nicht großgeschrieben</strong> (außer am Satzanfang und bei Eigennamen).',
     rows:[
       ['Singular (Einzahl)','a dog, the book, a city'],
       ['Plural (Mehrzahl)','dogs, books, cities — meist + s/es'],
       ['Eigennamen (immer groß)','London, Emma, Monday, English'],
       ['Zählbar / Nicht zählbar','a chair (zählbar) vs. water, music (nicht zählbar)'],
       ['Artikel','a/an = unbestimmt &nbsp;·&nbsp; the = bestimmt'],
     ],
     examples:['I have <u>a dog</u>.','The <u>book</u> is on the table.','<u>Emma</u> lives in <u>London</u>.']
    },
    {id:'verb',emoji:'⚡',title:'Verbs – Verben',color:'#FFF7ED',border:'#FED7AA',accent:'#92400E',
     intro:'Verben drücken Handlungen, Vorgänge oder Zustände aus. Im Englischen verändert sich das Verb je nach Zeitform und Person.',
     rows:[
       ['Simple Present','I play · he play<strong>s</strong>'],
       ['Simple Past','I play<strong>ed</strong> / go → went (unreg.)'],
       ['Present Progressive','I <strong>am playing</strong> · she <strong>is</strong> play<strong>ing</strong>'],
       ['Going-to Future','I <strong>am going to</strong> play'],
       ['Present Perfect','I <strong>have played</strong> · she <strong>has</strong> play<strong>ed</strong>'],
       ['Modal Verbs','can, must, should, will, may + Infinitiv'],
     ],
     examples:['She <u>plays</u> football every day.','We <u>went</u> to the cinema yesterday.','He <u>is reading</u> a book right now.']
    },
    {id:'adj',emoji:'🎨',title:'Adjectives – Adjektive/Eigenschaftswörter',color:'#F0FDF4',border:'#6EE7B7',accent:'#065F46',
     intro:'Adjektive beschreiben Nomen. Im Englischen stehen Adjektive <strong>vor dem Nomen</strong> (nicht danach wie im Deutschen manchmal möglich). Sie verändern ihre Form nicht (kein Genus, kein Kasus).',
     rows:[
       ['Attributiv (vor Nomen)','a <strong>tall</strong> girl, an <strong>old</strong> house'],
       ['Prädikativ (nach to be)','She is <strong>tall</strong>. The house is <strong>old</strong>.'],
       ['Komparativ (Vergleich)','tall → tall<strong>er</strong> · good → <strong>better</strong>'],
       ['Superlativ (höchste Stufe)','tall → <strong>the tallest</strong> · good → <strong>the best</strong>'],
       ['Mehrs. Adjektive','interesting → more interesting / the most interesting'],
     ],
     examples:['I have a <u>new</u> bike.','The film was <u>boring</u>.','She is <u>taller</u> than her brother.']
    },
    {id:'adv-freq',emoji:'🔁',title:'Adverbs of Frequency – Häufigkeitsadverbien',color:'#FAF5FF',border:'#C4B5FD',accent:'#5B21B6',
     intro:'Diese Adverbien sagen, <strong>wie oft</strong> etwas passiert. Sie stehen meist <strong>vor dem Hauptverb</strong>, aber <strong>nach</strong> to be.',
     rows:[
       ['always','immer (100 %)'],
       ['usually / normally','meistens (~80 %)'],
       ['often','oft (~60 %)'],
       ['sometimes','manchmal (~40 %)'],
       ['rarely / seldom','selten (~20 %)'],
       ['never','nie (0 %)'],
     ],
     examples:['I <u>always</u> brush my teeth.','She <u>sometimes</u> watches TV.','He is <u>never</u> late.','They <u>often</u> play football at the weekend.']
    },
    {id:'adv-time',emoji:'⏰',title:'Adverbs of Time – Zeitadverbien',color:'#FFFBEB',border:'#FDE68A',accent:'#92400E',
     intro:'Zeitadverbien sagen, <strong>wann</strong> etwas passiert. Sie stehen am <strong>Satzanfang</strong> oder <strong>Satzende</strong> — nicht in der Satzmitte.',
     rows:[
       ['Vergangenheit','yesterday, last week, two days ago, in 2020'],
       ['Gegenwart','today, now, at the moment, this week'],
       ['Zukunft','tomorrow, next Monday, in three days, soon'],
       ['Sonstiges','recently, already, yet, still, just'],
     ],
     examples:['<u>Yesterday</u>, we went to the park.','She is watching TV <u>at the moment</u>.<br><em>Tipp: Zeitadverbien können auch am Satzanfang stehen: <u>Every day</u>, my sister plays the guitar.</em>']
    },
    {id:'adv-manner',emoji:'🎯',title:'Adverbs of Manner – Modaladverbien (Wie?)',color:'#FFF1F2',border:'#FECDD3',accent:'#9F1239',
     intro:'Modaladverbien beschreiben, <strong>wie</strong> etwas passiert. Sie stehen meist <strong>nach dem Verb</strong> (oder nach dem Objekt). Bildung: Adjektiv + <strong>-ly</strong>.',
     rows:[
       ['quick → quickly','schnell'],
       ['careful → carefully','sorgfältig'],
       ['loud → loudly','laut'],
       ['good → well','gut (Ausnahme!)'],
       ['hard → hard','hart / angestrengt (kein -ly)'],
       ['fast → fast','schnell (kein -ly)'],
     ],
     examples:['She sings <u>beautifully</u>.','He works very <u>hard</u>.','Please speak <u>slowly</u>.']
    },
    {id:'prep',emoji:'📍',title:'Prepositions – Präpositionen',color:'#ECFDF5',border:'#A7F3D0',accent:'#065F46',
     intro:'Präpositionen zeigen <strong>Ort, Zeit oder Richtung</strong> an. Die wichtigsten drei für Zeit und Ort:',
     rows:[
       ['at','Uhrzeit, Orte (Punkt): <em>at 3 o\'clock, at school, at home</em>'],
       ['on','Wochentage, Daten, Flächen: <em>on Monday, on 5th May, on the table</em>'],
       ['in','Monate, Jahre, Räume: <em>in July, in 2020, in the room, in Berlin</em>'],
       ['to','Richtung/Ziel: <em>go to school, travel to London</em>'],
       ['from','Herkunft: <em>I\'m from Germany</em>'],
       ['with','Begleitung/Mittel: <em>with friends, write with a pen</em>'],
     ],
     examples:['I go to school <u>at</u> 7:30.','We have English <u>on</u> Tuesdays.','She lives <u>in</u> Berlin.']
    },
    {id:'pronoun',emoji:'👤',title:'Pronouns – Pronomen',color:'#F5F3FF',border:'#C4B5FD',accent:'#4C1D95',
     intro:'Pronomen ersetzen Nomen. Im Englischen gibt es <strong>Subjekt-</strong> und <strong>Objektpronomen</strong> sowie Possessivpronomen.',
     rows:[
       ['Subjekt','I, you, he, she, it, we, they'],
       ['Objekt','me, you, him, her, it, us, them'],
       ['Possessiv (Attribut)','my, your, his, her, its, our, their'],
       ['Possessiv (allein)','mine, yours, his, hers, its, ours, theirs'],
       ['Reflexiv','-self / -selves: myself, yourself, himself ...'],
     ],
     examples:['<u>She</u> likes <u>him</u>.','Is this book <u>yours</u>?','<u>He</u> hurt <u>himself</u>.']
    },
  ];
  return `<div class="space-y-6">
    <div style="display:flex;align-items:center;gap:1rem">
      <button onclick="go('grammar')" style="background:none;border:none;color:#3B82F6;cursor:pointer;font-size:.9rem">← Grammatik</button>
      <div>
        <h1 style="font-size:1.6rem;font-weight:800;color:#1E293B">🔤 Wortarten im Englischen</h1>
        <p style="font-size:.85rem;color:#64748B">Parts of Speech – Überblick mit Beispielen</p>
      </div>
    </div>
    ${sections.map(s=>`<div class="card" style="background:${s.color};border-color:${s.border};padding:1.25rem 1.5rem">
      <h2 style="font-weight:800;color:${s.accent};margin-bottom:.5rem;font-size:1rem">${s.emoji} ${s.title}</h2>
      <p style="font-size:.88rem;color:#374151;margin-bottom:.85rem;line-height:1.6">${s.intro}</p>
      <table style="width:100%;border-collapse:collapse;font-size:.85rem;margin-bottom:.85rem">
        ${s.rows.map((r,i)=>`<tr style="background:${i%2===0?'rgba(255,255,255,.6)':'rgba(255,255,255,.2)'}">
          <td style="padding:.4rem .75rem;font-weight:700;color:${s.accent};white-space:nowrap;border-radius:.25rem 0 0 .25rem;width:40%">${r[0]}</td>
          <td style="padding:.4rem .75rem;color:#374151">${r[1]}</td>
        </tr>`).join('')}
      </table>
      <div style="background:rgba(255,255,255,.7);border-radius:.75rem;padding:.6rem .9rem">
        <p style="font-size:.75rem;font-weight:700;color:${s.accent};margin-bottom:.3rem">Beispiele:</p>
        ${s.examples.map(e=>`<p style="font-size:.85rem;color:#1E293B;margin:.15rem 0">• ${e}</p>`).join('')}
      </div>
    </div>`).join('')}
  </div>`;
}

    <p style="color:#64748B;margin-top:.3rem">Erklärungen und Übungen für Klasse 5 und 6</p></div>
    <div onclick="go('grammar-wortarten')" class="card" style="cursor:pointer;display:flex;align-items:center;gap:1rem;background:#F0FDF4;border-color:#6EE7B7" onmouseover="this.style.boxShadow='0 4px 12px rgba(0,0,0,.1)'" onmouseout="this.style.boxShadow=''">
      <span style="font-size:2rem">🔤</span>
      <div style="flex:1">

      </div>
      <span style="color:#10B981">›</span>
    </div>
    ${cats.map(cat=>{

        <div style="display:flex;flex-direction:column;gap:.5rem">
          ${topics.map(t=>{
            const done = P.grammar[t.id]&&P.grammar[t.id].completed;

            return `<div onclick="go('grammar-topic','${t.id}')" style="display:flex;align-items:center;gap:1rem;padding:.75rem 1rem;border-radius:.75rem;cursor:pointer;border:1.5px solid ${done?'#6EE7B7':'#F1F5F9'};background:${done?'#ECFDF5':'#fff'};transition:all .15s" onmouseover="this.style.background='#F8FAFC'" onmouseout="this.style.background='${done?'#ECFDF5':'#fff'}'">
              <span style="font-size:1.2rem">${done?'✅':'⭕'}</span>
              <div style="flex:1">
                <p style="font-weight:600;color:#1E293B;font-size:.9rem">${t.title}</p>
                <p style="font-size:.75rem;color:#94A3B8">${t.level} · ${t.desc}</p>
              </div>
              ${score!==undefined?`<span style="font-size:.75rem;font-weight:700;background:${score>=80?'#D1FAE5':'#F1F5F9'};color:${score>=80?'#065F46':'#64748B'};padding:.2rem .6rem;border-radius:99px">${score}%</span>`:''}

          }).join('')}

      </div>`;
    }).join('')}

}

function renderGrammarTopic(id){
  const t = GRAMMAR.find(g=>g.id===id);
  if(!t) return '<p>Thema nicht gefunden.</p>';
  const pg = P.grammar[id]||{};
  const ohe = GRAMMAR_OHE[id]||{};
  const tab = _state.data || 'observe';

  const tBtn = (key,emoji,label) => `<button onclick="go('grammar-topic','${id}','${key}')"
    style="padding:.5rem 1.1rem;border-radius:.75rem;font-size:.85rem;font-weight:600;cursor:pointer;border:none;
    background:${tab===key?'#3B82F6':'#F1F5F9'};color:${tab===key?'#fff':'#64748B'};transition:all .15s">${emoji} ${label}</button>`;

  let content = '';
  if(tab==='observe'){
    const sentences = ohe.observe||t.examples.map(e=>e.en).slice(0,5);
    content = `<div class="card space-y-5">
      <p style="font-size:.88rem;color:#64748B;font-style:italic">Lies diese Sätze sorgfältig. Was fällt dir auf?</p>
      <div style="display:flex;flex-direction:column;gap:.4rem">
        ${sentences.map(s=>`<div style="background:#F8FAFC;border-left:3px solid #3B82F6;padding:.55rem .85rem;border-radius:0 .5rem .5rem 0;font-size:.95rem;font-weight:600;color:#1E293B">${colorSentence(s,t.id)}</div>`).join('')}
      </div>
      ${ohe.observeQ?`<div style="background:#FFFBEB;border-radius:.75rem;padding:.9rem;border:1px solid #FDE68A">

function showLang(lang){

  document.getElementById('expl-en').style.display = lang==='en'?'block':'none';
  document.getElementById('lang-de').className = lang==='de'?'btn-primary':'btn-secondary';
  document.getElementById('lang-en').className = lang==='en'?'btn-primary':'btn-secondary';
  document.getElementById('lang-de').style.cssText = 'font-size:.8rem;padding:.4rem .9rem';
  document.getElementById('lang-en').style.cssText = 'font-size:.8rem;padding:.4rem .9rem';
}
function colorSentence(s, topicId){
  s = s.replace(/(don't|doesn't|didn't|can't|won't|isn't|aren't|wasn't|weren't)/gi,
    '<span style="color:#EF4444;font-weight:700">$1</span>');
  s = s.replace(/\b(did|does|do|was|were|is|are|am|will)\b/g,
    '<span style="color:#EF4444;font-weight:700">$1</span>');
  s = s.replace(/\b(What|Where|When|Who|How|Why|Which)\b/g,
    '<span style="color:#8B5CF6;font-weight:700">$1</span>');
  s = s.replace(/\b(I|You|We|They|He|She|It|you|we|they|he|she|it)\b/g,
    '<span style="color:#3B82F6;font-weight:700">$1</span>');
  if(topicId==='past'){
    s = s.replace(/(\w+)(ied)\b/g,
      '<span style="color:#10B981;font-weight:700">$1</span><span style="color:#F59E0B;font-weight:700">ied</span>');
    s = s.replace(/(\w{3,})(ed)\b/g,
      '<span style="color:#10B981;font-weight:700">$1</span><span style="color:#F59E0B;font-weight:700">ed</span>');
  }
  if(topicId==='pp'){
    s = s.replace(/(\w+)(-ing)\b/g,
      '<span style="color:#10B981;font-weight:700">$1</span><span style="color:#F59E0B;font-weight:700">$2</span>');
  }
  s = s.replace(/\b(play|plays|played|go|goes|went|have|has|had|read|reads|like|likes|speak|speaks|eat|eats|ate|drink|drinks|drank|watch|watches|watched|live|lives|lived|know|knew|think|thought|feel|felt|brush|brushes|listen|listens|clean|cleans|cleaned|swim|swam|write|wrote|run|ran|come|came|see|saw|make|made|get|got|take|took|give|gave|say|said|find|found|buy|bought|bring|brought|meet|met|sit|sat|sleep|slept|visit|visited|arrive|arrived|start|started|finish|finished|help|helped|move|moved|study|studied|collect|collected|train|trained)\b/g,
    '<span style="color:#10B981;font-weight:700">$1</span>');
  s = s.replace(/(yesterday|last night|last week|last summer|right now|at the moment|now|tomorrow|every day|every week|always|usually|often|sometimes|never)/gi,
    '<span style="color:#0891B2;font-size:.9em">$1</span>');
  return s;
}
function colorExpl(s){
  s = s.replace(/(don't|doesn't|didn't|can't|won't|isn't|aren't|wasn't|weren't)/gi,
    '<span style="color:#EF4444;font-weight:700">$1</span>');
  s = s.replace(/\b(What|Where|When|Who|How|Why|Which)\b/g,
    '<span style="color:#8B5CF6;font-weight:700">$1</span>');
  s = s.replace(/\b(not)\b/g, '<span style="color:#EF4444;font-weight:700">not</span>');
  s = s.replace(/\b(do\/does|did|do|does|am\/is\/are|am|is|are|was\/were|was|were|will|have|has|had|can|could|would|should)\b/g,
    '<span style="color:#EF4444;font-weight:700">$1</span>');
  s = s.replace(/(\w+)(ied)\b/g,
    '<span style="color:#10B981;font-weight:700">$1</span><span style="color:#F59E0B;font-weight:700">ied</span>');
  s = s.replace(/(\w{3,})(ed)\b/g,
    '<span style="color:#10B981;font-weight:700">$1</span><span style="color:#F59E0B;font-weight:700">ed</span>');
  s = s.replace(/(\w+)(-ing)\b/g,
    '<span style="color:#10B981;font-weight:700">$1</span><span style="color:#F59E0B;font-weight:700">$2</span>');
  s = s.replace(/going to/g, '<span style="color:#8B5CF6;font-weight:700">going to</span>');
  s = s.replace(/(Subject|Verb|Object|Subjekt|Objekt)\b/g,
    '<span style="background:#DBEAFE;color:#1E40AF;border-radius:3px;padding:0 3px;font-weight:700;font-size:.88em">$1</span>');
  s = s.replace(/\b(I|You|We|They|He|She|It|he\/she\/it|I\/you\/we\/they)\b/g,
    '<span style="color:#3B82F6;font-weight:700">$1</span>');
  s = s.replace(/(yesterday|last week|last night|last summer|ago|tomorrow|next week|soon|always|usually|often|sometimes|never)/gi,
    '<span style="color:#0891B2;font-weight:600">$1</span>');
  return s;
}

function toggleMistakes(){
  const b = document.getElementById('mistakes-body');
  const a = document.getElementById('mistakes-arrow');
  if(b.style.display==='none'){ b.style.display='block'; a.textContent='▲'; }

// ═══════════════════════════════════════════════
// EXERCISES
// ═══════════════════════════════════════════════
let _ex = {};
let _gPick = {}; // exercise state

function rerollGrammar(topicId,typeKey){
  const pool=GRAMMAR_POOL[topicId]||[];
  const tf=typeKey==='mc'?'mc':typeKey==='fill'?'fg':'wo';
  const sub=pool.filter(e=>e.type===tf);
  if(!sub.length)return;
  const cur=_gPick[topicId]&&_gPick[topicId][typeKey];
  let pick;
  do{pick=sub[Math.floor(Math.random()*sub.length)];}while(pick.id===cur&&sub.length>1);
  if(!_gPick[topicId])_gPick[topicId]={};
  _gPick[topicId][typeKey]=pick.id;
  go('grammar-topic',topicId,'exercises');
}

function renderExercisePage(topicId, exId){
  const t=GRAMMAR.find(g=>g.id===topicId);
  if(!t)return '';
  const pool=GRAMMAR_POOL[topicId]||[];
  const ex=pool.find(e=>e.id===exId);
  if(!ex)return '';
  let items;
  if(ex.type==='mc'){items=(ex.questions||[]).map(q=>({...q,ans:q.opts[q.correct]}));}
  else if(ex.type==='fg'){items=(ex.sentences||[]).map(s=>({...s,text:s.pre+' ___ '+s.suf,answer:s.ans}));}
  else if(ex.type==='wo'){items=(ex.items||[]).map(i=>({...i,answer:i.correct,words:i.words||i.correct.split(' ')}));}
  else{items=ex.items||ex.sentences||ex.questions||[];}
  _ex={topicId,exId,type:ex.type,items,state:'active',answers:[],score:0,idx:0,chosen:[]};
  return `<div class="space-y-6">
    <div style="display:flex;align-items:center;gap:1rem">
      <button onclick="go('grammar-topic','${topicId}','exercises')" style="background:none;border:none;color:#3B82F6;cursor:pointer;font-size:.9rem">← ${t.title}</button>
      <span style="font-weight:700;color:#1E293B">${ex.title}</span>
    </div>
    <div id="ex-area">${renderExerciseArea()}</div>
  </div>`;
}

function renderExerciseArea(){
  if(_ex.state==='done') return renderExDone();
  if(_ex.type==='mc') return renderMC();
  if(_ex.type==='fg' || _ex.type==='fill') return renderFill();
  if(_ex.type==='wo' || _ex.type==='wordorder') return renderWO();
  if(_ex.type==='type') return renderTypeEx();
  return '<p style="color:red">Unbekannter Typ: '+_ex.type+'</p>';
}

// Multiple Choice
function renderMC(){
  const items = _ex.items;
  const i = _ex.idx;
  const q = items[i];
  const total = items.length;
  const dots = items.map((_,j)=>`<span style="display:inline-block;width:.6rem;height:.6rem;border-radius:50%;background:${j<i?'#10B981':j===i?'#3B82F6':'#E2E8F0'};margin:0 .2rem"></span>`).join('');

  return `<div class="card space-y-5">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>${dots}</div>
      <span style="font-size:.8rem;color:#94A3B8">${i+1} / ${total}</span>
    </div>
    <p style="font-weight:600;color:#1E293B;font-size:1rem">${q.q}</p>
    <div id="opts-wrap">
      ${q.opts.map((o,oi)=>`<button class="opt-btn" id="opt-${oi}" onclick="pickMC(${oi},'${escQ(o)}','${escQ(q.ans)}')">${o}</button>`).join('')}
    </div>
    <div id="mc-feedback"></div>
  </div>`;
}

function escQ(s){ return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function pickMC(oi, chosen, correct){
  const isRight = chosen === correct;
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  document.getElementById('opt-'+oi).className = isRight ? 'opt-btn opt-correct' : 'opt-btn opt-wrong';
  if(!isRight){
    const opts = _ex.items[_ex.idx].opts;
    const ci = opts.findIndex(o=>o===correct);
    if(ci>=0) document.getElementById('opt-'+ci).className = 'opt-btn opt-correct';
  }
  if(isRight) _ex.score++;
  _ex.answers.push({chosen, correct, right:isRight});
  const fb = document.getElementById('mc-feedback');
  fb.innerHTML = isRight
    ? `<div class="feedback-ok">✅ Richtig!</div>`
    : `<div class="feedback-err">✗ Falsch. Richtig: <strong>${correct}</strong></div>`;
  fb.innerHTML += `<button class="btn-primary" style="margin-top:.75rem" onclick="nextMC()">${_ex.idx+1<_ex.items.length?'Weiter →':'Ergebnis anzeigen'}</button>`;
}

function nextMC(){
  _ex.idx++;
  if(_ex.idx >= _ex.items.length) { _ex.state='done'; }
  document.getElementById('ex-area').innerHTML = renderExerciseArea();
}

// Fill in the gaps
function renderFill(){
  const sentences = _ex.items;
  return `<div class="card space-y-5">
    <p style="font-weight:700;color:#1E293B">Ergänze die Lücken mit der richtigen Form.</p>
    ${sentences.map((s,i)=>`<div style="margin-bottom:.75rem;padding:.6rem .75rem;background:#F8FAFC;border-radius:.75rem">
      <p style="font-size:.95rem;color:#1E293B;line-height:2.2">
        ${s.hint?`<button onclick="toggleFillHint(${i})" title="Hinweis anzeigen" style="background:none;border:none;cursor:pointer;font-size:.95rem;padding:0 .3rem 0 0;vertical-align:middle;opacity:.6" id="hint-btn-${i}">💡</button>`:''}
        <span style="color:#3B82F6;font-weight:600">${s.pre}</span>
        <input class="gap-input" id="fill-${i}" type="text" placeholder="..." autocomplete="off" autocorrect="off" spellcheck="false">
        <span style="color:#1E293B"> ${(s.suf||'').replace(/\s*\([^)]+\)/,'')}</span>
        <span style="color:#94A3B8;font-size:.8rem"> ${(s.suf||'').match(/\(([^)]+)\)/)?'('+s.suf.match(/\(([^)]+)\)/)[1]+')':''}</span>
      </p>
      ${s.hint?`<div id="hint-box-${i}" style="display:none;font-size:.78rem;color:#3B82F6;margin-top:.2rem;font-style:italic;padding:.2rem .4rem;background:#EFF6FF;border-radius:.4rem">💡 ${s.hint}</div>`:''}
    </div>`).join('')}
    <div style="display:flex;gap:.75rem;flex-wrap:wrap">
      <button class="btn-primary" onclick="checkFill()">Überprüfen ✓</button>
    </div>
    <div id="fill-feedback"></div>
  </div>`;
}

function checkFill(){
  let correct = 0;
  const sentences = _ex.items;
  sentences.forEach((s,i)=>{
    const inp = document.getElementById('fill-'+i);
    if(!inp) return;
    const val = inp.value.trim().toLowerCase();
    const ans = (s.answer||s.ans||'').toLowerCase();
    if(val===ans){
      inp.style.borderBottomColor='#10B981';
      inp.style.color='#065F46';
      correct++;
    } else {
      inp.style.borderBottomColor='#EF4444';
      inp.style.color='#991B1B';
    }
  });
  _ex.score = Math.round(correct/sentences.length*100);
  const fb = document.getElementById('fill-feedback');
  fb.innerHTML = `<div class="${correct===sentences.length?'feedback-ok':'feedback-err'}">${correct} von ${sentences.length} richtig (${_ex.score}%)</div>
    <div style="margin-top:.75rem">
      ${sentences.map((s,i)=>{
        const inp = document.getElementById('fill-'+i);
        const val = inp?inp.value.trim():'';
        const right = val.toLowerCase()===s.answer.toLowerCase();
        return right?'':  `<p style="font-size:.85rem;color:#64748B;margin-top:.3rem">Richtig: <strong style="color:#10B981">${s.answer}</strong></p>`;
      }).join('')}
    </div>
    <button class="btn-primary" style="margin-top:.75rem" onclick="finishFill()">Fertig ✓</button>`;
}

function toggleObsHint(){
  const box=document.getElementById('obs-hint-box');
  const btn=document.getElementById('obs-hint-btn');
  if(!box)return;
  const vis=box.style.display!=='none';
  box.style.display=vis?'none':'block';
  if(btn){btn.style.opacity=vis?'.6':'1';btn.textContent=vis?'💡 Tipp anzeigen':'💡 Tipp verbergen';}
}
function toggleWOHint(){
  const box=document.getElementById('wo-hint-box');
  const btn=document.getElementById('wo-hint-btn');
  if(!box)return;
  const vis=box.style.display!=='none';
  box.style.display=vis?'none':'block';
  if(btn){btn.style.opacity=vis?'.6':'1';btn.textContent=vis?'💡 Tipp anzeigen':'💡 Tipp verbergen';}
}
function toggleFillHint(i){
  const box = document.getElementById('hint-box-'+i);
  const btn = document.getElementById('hint-btn-'+i);
  if(!box) return;
  const visible = box.style.display!=='none';
  box.style.display = visible?'none':'block';
  if(btn) btn.style.opacity = visible?'.6':'1';
}

function showFillHints(){
  _ex.items.forEach((s,i)=>{
    const inp = document.getElementById('fill-'+i);
    if(inp && !inp.value) inp.placeholder = s.answer[0]+'…';
  });
}

function finishFill(){
  _ex.state='done';
  document.getElementById('ex-area').innerHTML = renderExerciseArea();

// WO chip normalization
const WO_PROPER=new Set(['Anna','Tim','Tom','Emma','Max','Sophie','Lucy','Ben','Liam','Mia','Lisa','Sara','Mike','Jake','Amy','London','Paris','Berlin','Munich','Hamburg','Rome','Madrid','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday','January','February','March','April','May','June','July','August','September','October','November','December','English','German','French','Spanish','Italian']);
function normalizeWOChip(w){const s=w.replace(/[.!?,;:]+$/,'');if(s==='I'||WO_PROPER.has(s))return s;return s.charAt(0).toLowerCase()+s.slice(1);}

// Word Order
function renderWO(){
  const items = _ex.items;
  const i = _ex.idx;
  const item = items[i];
  const rawWords=item.phrases||item.words||item.answer.split(' ');
  const words=rawWords.map(normalizeWOChip);
  const shuffled=[...words].sort(()=>Math.random()-.5);
  _ex.woChosen=[];
  _ex.woShuffled=shuffled;
  _ex.woWords=words;
  _ex.woCorrect=item.correct||item.answer;

  return `<div class="card space-y-5">
    <div style="display:flex;justify-content:space-between">
      <p style="font-weight:700;color:#1E293B">Bilde den richtigen Satz.</p>
      <span style="font-size:.8rem;color:#94A3B8">${i+1}/${items.length}</span>
    </div>
    ${item.hint?`<button onclick="toggleWOHint()" id="wo-hint-btn" style="background:none;border:none;cursor:pointer;font-size:.82rem;color:#64748B;opacity:.6;padding:.1rem .3rem">💡 Tipp anzeigen</button><div id="wo-hint-box" style="display:none;font-size:.85rem;color:#64748B;font-style:italic;margin-top:.25rem;padding:.3rem .6rem;background:#F1F5F9;border-radius:.4rem">${item.hint}</div>`:''}
    <div class="drop-zone" id="wo-drop">
      <span style="color:#CBD5E1;font-size:.85rem" id="wo-placeholder">Tippe auf die Wörter unten...</span>
    </div>
    <div id="wo-chips">
      ${shuffled.map((w,wi)=>`<span class="word-chip" id="wchip-${wi}" onclick="pickWO(${wi},'${escQ(w)}')">${w}</span>`).join('')}
    </div>
    <div style="display:flex;gap:.75rem">
      <button class="btn-primary" onclick="checkWO()">Prüfen ✓</button>
      <button class="btn-secondary" onclick="clearWO()">Zurücksetzen</button>
    </div>
    <div id="wo-feedback"></div>
  </div>`;
}

function pickWO(wi, word){
  const chip = document.getElementById('wchip-'+wi);
  if(chip.classList.contains('chosen')) return;
  chip.classList.add('chosen');
  _ex.woChosen.push({wi, word});
  const drop = document.getElementById('wo-drop');
  const ph = document.getElementById('wo-placeholder');
  if(ph) ph.style.display='none';
  drop.innerHTML = _ex.woChosen.map((c,ci)=>`<span class="word-chip chosen" onclick="removeWO(${ci})">${c.word}</span>`).join('') + '<span id="wo-placeholder" style="display:none"></span>';
}

function removeWO(ci){
  const item = _ex.woChosen[ci];
  _ex.woChosen.splice(ci,1);
  const chip = document.getElementById('wchip-'+item.wi);
  if(chip) chip.classList.remove('chosen');
  const drop = document.getElementById('wo-drop');
  if(_ex.woChosen.length===0){
    drop.innerHTML = '<span style="color:#CBD5E1;font-size:.85rem" id="wo-placeholder">Tippe auf die Wörter unten...</span>';
  } else {
    drop.innerHTML = _ex.woChosen.map((c,ci2)=>`<span class="word-chip chosen" onclick="removeWO(${ci2})">${c.word}</span>`).join('');
  }
}

function clearWO(){
  _ex.woChosen = [];
  document.querySelectorAll('.word-chip').forEach(c=>c.classList.remove('chosen'));
  document.getElementById('wo-drop').innerHTML = '<span style="color:#CBD5E1;font-size:.85rem">Tippe auf die Wörter unten...</span>';
  document.getElementById('wo-feedback').innerHTML = '';
}

function checkWO(){
  const answer=_ex.woChosen.map(c=>c.word).join(' ');
  const item=_ex.items[_ex.idx];
  const correct=_ex.woCorrect||item.answer;
  const normWO=s=>s.toLowerCase().replace(/[.!?,;:]+/g,'').replace(/\s+/g,' ').trim();
  const nA=normWO(answer), nC=normWO(correct);
  let isRight=nA===nC;
  // Also accept: trailing adverbial phrase moved to front (or front phrase moved to end)
  if(!isRight && item.phrases && item.phrases.length>=2){
    const nPh=item.phrases.map(p=>normWO(p));
    const last=nPh[nPh.length-1];
    const first=nPh[0];
    if(nC.endsWith(' '+last)||nC===last){
      const base=nC.endsWith(' '+last)?nC.slice(0,nC.length-last.length-1):nC.slice(last.length);
      if(nA===last+' '+base.trim()) isRight=true;
    }
    if(!isRight&&(nC.startsWith(first+' ')||nC===first)){
      const base=nC.startsWith(first+' ')?nC.slice(first.length+1):nC.slice(first.length);
      if(nA===base.trim()+' '+first) isRight=true;
    }
  }
  if(isRight) _ex.score++;
  _ex.answers.push({answer, correct, right:isRight});
  document.getElementById('wo-feedback').innerHTML = isRight
    ? `<div class="feedback-ok">✅ Richtig!</div><button class="btn-primary" style="margin-top:.75rem" onclick="nextWO()">${_ex.idx+1<_ex.items.length?'Weiter →':'Ergebnis anzeigen'}</button>`
    : `<div class="feedback-err">✗ Richtig wäre: <strong>${correct}</strong></div><button class="btn-primary" style="margin-top:.75rem" onclick="nextWO()">${_ex.idx+1<_ex.items.length?'Weiter →':'Ergebnis anzeigen'}</button>`;
}

function nextWO(){
  _ex.idx++;
  if(_ex.idx >= _ex.items.length) { _ex.state='done'; }
  document.getElementById('ex-area').innerHTML = renderExerciseArea();
}

// ── RANDOM VOCAB TEST ──
let _rvt = {items:[], idx:0, score:0, flipped:false, done:false};

function buildVocabTestItems(n){
  n = n || 20;
  const all = [];
  VOCAB.forEach(t=>{ t.words.forEach(w=>{ all.push({word:w, topic:t.title}); }); });
  // shuffle
  for(let i=all.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [all[i],all[j]]=[all[j],all[i]]; }
  return all.slice(0, Math.min(n, all.length)).map(item=>{
    const isDE = Math.random() < 0.5;
    return { word:item.word, topic:item.topic, isDE, prompt:isDE?item.word.de:item.word.en, correct:isDE?item.word.en:item.word.de };
  });
}

function startVocabTest(n){
  _rvt = {items:buildVocabTestItems(n), idx:0, score:0, flipped:false, done:false};
  go('vocab-test');
}

function rvtFlip(){
  _rvt.flipped = !_rvt.flipped;
  go('vocab-test');
}

function rvtAnswer(correct){
  if(correct){
    _rvt.score++;
  } else {
    // Mit Zurücklegen: falsche Karte ans Ende der Warteschlange
    _rvt.items.push(_rvt.items[_rvt.idx]);
  }
  _rvt.idx++;
  _rvt.flipped = false;
  if(_rvt.idx>=_rvt.items.length) _rvt.done=true;
  go('vocab-test');
}

function renderVocabTopic(id, mode){
  const t = VOCAB.find(v=>v.id===id);
  if(!t) return '<p>Nicht gefunden.</p>';
  mode = mode||'list';
  const vp = P.vocab[id]||{known:[]};
  const known = new Set(vp.known||[]);

  const tabBtn = (m, label) => `<button onclick="startVocabMode('${id}','${m}')" style="padding:.5rem 1rem;border-radius:.75rem;font-size:.85rem;font-weight:600;cursor:pointer;border:none;background:${mode===m?'#3B82F6':'#F1F5F9'};color:${mode===m?'#fff':'#64748B'};transition:all .15s">${label}</button>`;
  const tabBtn2 = (m, label) => tabBtn(m, label);

  let content = '';
  if(mode==='list') content = renderVocabList2(t, known, id);
  else if(mode==='flashcard') content = renderFlashcard(t, id);
  else if(mode==='quiz') content = renderVocabQuiz(t, id);
  else if(mode==='type') content = renderVocabType(t, id);

  return `<div class="space-y-5">
    <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">

      ${tabBtn('quiz','🧪 Quiz')}
      ${tabBtn('type','✏️ Schreiben')}
    </div>
    ${content}
  </div>`;
}


// ── Web Speech API ──
function speak(text, lang){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang || 'en-GB';
  u.rate = 0.88;
  window.speechSynthesis.speak(u);
}
function speakBtn(text, lang){
  const l = lang || 'en-GB';
  return `<button onclick="event.stopPropagation();speak('${text}','${l}')" title="Aussprache" style="background:none;border:none;cursor:pointer;font-size:.95rem;padding:.1rem .25rem;color:#CBD5E1;line-height:1" onmouseover="this.style.color='#3B82F6'" onmouseout="this.style.color='#CBD5E1'">🔊</button>`;
}

function startVocabMode(id, mode){
  if(mode==='flashcard'){
    // Force reshuffle: reset _fc so renderFlashcard sees a new topic and reshuffles
    _fc = {id:'', idx:0, flipped:false, direction:(_fc&&_fc.direction)||'en-de', words:[]};
  } else if(mode==='quiz'){
    if(_vqState[id]) _vqState[id] = {};
  } else if(mode==='type'){
    if(_vtState[id]) _vtState[id] = {};
  }
  go('vocab-topic', id, mode);
}

          <span style="font-size:1.1rem">${isKnown?'✅':'⭕'}</span>

        </div>`;
      }).join('')}
    </div>
  </div>`;

function toggleKnown(id, idx){
  if(!P.vocab[id]) P.vocab[id] = {known:[]};
  const known = P.vocab[id].known;
  const pos = known.indexOf(idx);
  if(pos>=0) known.splice(pos,1); else known.push(idx);
  save();
  const isKnown = pos<0;
  const el = document.getElementById(`vw-${id}-${idx}`);
  if(el){
    el.style.background = isKnown?'#ECFDF5':'#F8FAFC';
    el.querySelector('span').textContent = isKnown?'✅':'⭕';
  }
}

function markAllKnown(id){
  const t = VOCAB.find(v=>v.id===id);
  if(!t) return;
  if(!P.vocab[id]) P.vocab[id] = {known:[]};
  P.vocab[id].known = t.words.map((_,i)=>i);
  save();
  go('vocab-topic',id,'list');
}

let _fc = {id:'', idx:0, flipped:false, direction:'en-de', words:[]};
function renderFlashcard(t, id){
  const vp = P.vocab[id]||{known:[]};
  const known = new Set(vp.known||[]);
  // On topic change: shuffle and store origIdx for toggleKnown
  if(_fc.id !== id){
    const shuffled = [...t.words].map((w,origIdx)=>({...w,origIdx})).sort(()=>Math.random()-.5);
    _fc = {id, idx:0, flipped:false, direction:_fc.direction||'en-de', words:shuffled};
  }
  const i = _fc.idx;
  const w = _fc.words[i];
  const origIdx = w.origIdx !== undefined ? w.origIdx : i;
  const dir = _fc.direction || 'en-de';
  const frontText = dir === 'en-de' ? w.en : w.de;
  const backText  = dir === 'en-de' ? w.de : w.en;
  const frontColor = dir === 'en-de' ? '#1E40AF' : '#064E3B';
  return `<div class="card space-y-4">
    <div style="display:flex;justify-content:space-between;align-items:center;font-size:.85rem;color:#94A3B8">
      <span>${i+1}/${_fc.words.length}</span>
      <button onclick="toggleFCDir('${id}')" style="font-size:.75rem;background:#F1F5F9;border:none;border-radius:.5rem;padding:.25rem .6rem;cursor:pointer;color:#475569;font-weight:600">
        ${dir==='en-de'?'🇬🇧→🇩🇪':'🇩🇪→🇬🇧'} wechseln
      </button>

function pickVQ(oi, chosen, correct){
  const isRight = chosen===correct;
  document.querySelectorAll('#vq-opts .opt-btn').forEach(b=>b.disabled=true);
  document.getElementById('vqopt-'+oi).className = isRight?'opt-btn opt-correct':'opt-btn opt-wrong';
  if(!isRight){
    const opts = document.querySelectorAll('#vq-opts .opt-btn');
    opts.forEach(b=>{ if(b.textContent.trim()===correct) b.className='opt-btn opt-correct'; });
  }
  const qs = _vqState[_state.sub];
  if(isRight) qs.score++;
  qs.answers.push({chosen,correct,right:isRight});
  const fb = document.getElementById('vq-feedback');
  fb.innerHTML = (isRight?`<div class="feedback-ok">✅ Richtig!</div>`:`<div class="feedback-err">✗ Richtig: <strong>${correct}</strong></div>`)
    + `<button class="btn-primary" style="margin-top:.75rem" onclick="nextVQ()">Weiter →</button>`;
}

function nextVQ(){
  const id = _state.sub;
  const qs = _vqState[id];
  const lastAns = qs.answers[qs.answers.length-1];
  if(lastAns && !lastAns.right){
    // Mit Zurücklegen: falsche Wörter ans Ende
    qs.words.push(qs.words[qs.idx]);
    if(!P.errors)P.errors={};const _vek='vocab:'+id;P.errors[_vek]=(P.errors[_vek]||0)+1;
  }
  qs.idx++;
  if(qs.idx >= qs.words.length){
    qs.done = true;
    P.vocab[id] = P.vocab[id]||{known:[]};
    P.vocab[id].tested = true;
    P.vocab[id].quizScore = Math.round(qs.score/Math.max(1,qs.answers.length)*100);
    addXP(20);
    checkBadges();
    save();
  }
  go('vocab-topic',id,'quiz');
}

function normalizeVocab(s){
  return s.toLowerCase()
    .replace(/^to\s+/,'')
    .replace(/^(der|die|das|the)\s+/i,'')
    .replace(/[.,!?;:]/g,'')
    .trim();
}

function checkVocabType(id, correct){
  const inp = document.getElementById('vtype-input');
  const val = inp ? inp.value.trim() : '';
  _vtState[id].val = val;
  const normVal = normalizeVocab(val);
  // find the current word to check alts
  const qs = _vtState[id];
  const t = VOCAB.find(v=>v.id===id);
  const w = qs.words[qs.idx] || (t ? t.words[qs.idx] : null);
  const alts = (w && w.alts) ? w.alts : [];
  // build list of accepted answers: correct + alts
  const accepted = [correct, ...alts].map(a=>normalizeVocab(a));
  // fuzzy: val is contained in correct (for multi-word answers where student types partial)
  const fuzzyOk = accepted.some(a => a.includes(normVal) && normVal.length > 2);
  const exactOk = accepted.some(a => a === normVal);
  const isRight = exactOk || fuzzyOk;
  _vtState[id].checked = true;
  _vtState[id].lastRight = isRight;
  if(isRight) _vtState[id].score++;
  go('vocab-topic', id, 'type');
}

function nextVocabType(id){
  const qs = _vtState[id];
  if(!qs.lastRight){
    // Mit Zurücklegen: falsche Antwort ans Ende der Warteschlange
    qs.words.push(qs.words[qs.idx]);
    if(!P.errors)P.errors={};const _tek='vocab:'+id;P.errors[_tek]=(P.errors[_tek]||0)+1;
  }
  qs.idx++;
  qs.checked = false;
  qs.val = '';
  if(qs.idx >= qs.words.length){
    qs.done = true;
    const t = VOCAB.find(v=>v.id===id);
    const total = t ? t.words.length : qs.words.length;
    P.vocab[id] = P.vocab[id]||{known:[]};
    P.vocab[id].typed = true;
    P.vocab[id].typeScore = Math.round(qs.score/Math.max(1,total)*100);
    addXP(15); checkBadges(); save();
  }
  go('vocab-topic', id, 'type');
}

    </div>
    <div id="irmc-fb"></div>
  </div>`;
}
function pickIrMC(oi, chosen, correct){
  const isRight = chosen===correct;
  document.querySelectorAll('#irmc-opts .opt-btn').forEach(b=>b.disabled=true);
  document.getElementById('irmc-'+oi).className = isRight?'opt-btn opt-correct':'opt-btn opt-wrong';
  if(!isRight) document.querySelectorAll('#irmc-opts .opt-btn').forEach(b=>{ if(b.textContent.trim()===correct) b.className='opt-btn opt-correct'; });
  if(isRight) _irMC.score++;
  _irMC.answers.push({right:isRight});
  const fb = document.getElementById('irmc-fb');
  fb.innerHTML = (isRight?`<div class="feedback-ok">✅ Richtig!</div>`:`<div class="feedback-err">✗ Richtig: <strong>${correct}</strong></div>`)
    + `<button class="btn-primary" style="margin-top:.75rem;background:#F59E0B" onclick="nextIrMC()">${_irMC.idx<29?'Weiter →':'Ergebnis'}</button>`;
}
function nextIrMC(){
  _irMC.idx++;
  if(_irMC.idx>=30){ _irMC.done=true; }
  go('irreg','mc');
}
function renderIrregMCDone(){
  const pct = Math.round(_irMC.score/30*100);
  return `<div class="card" style="text-align:center;padding:2rem">
    <div style="font-size:3rem">${pct>=80?'🏆':pct>=60?'👍':'💪'}</div>
    <h2 style="font-size:1.4rem;font-weight:800;color:#1E293B;margin:.5rem 0">${pct}% richtig</h2>
    ${pb(pct,'#F59E0B')}
    <div style="margin-top:1rem;display:flex;gap:.75rem;justify-content:center">
      <button class="btn-secondary" onclick="_irMC={idx:0,score:0,answers:[],done:false};go('irreg','mc')">Nochmal</button>
      <button class="btn-primary" style="background:#F59E0B" onclick="go('irreg','list')">Zur Liste</button>
    </div>
  </div>`;
}

let _irWr = {idx:0, score:0, answers:[], checked:false, val:''};
function renderIrregWrite(){
  if(_irWr.done) return renderIrregWriteDone();
  const _irPool = _irShuffled.length ? _irShuffled : IRREG;

  const isChecked = _irWr.checked;
  return `<div class="card space-y-5">

    <div style="display:flex;flex-direction:column;gap:.5rem">

        <input id="ir-past" type="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="..." class="gap-input" style="flex:1;font-size:1rem;color:${isChecked?(_irWr.pastOk?'#065F46':'#991B1B'):'#1E293B'}" ${isChecked?'disabled':''} value="${isChecked?(_irWr.pastVal||''):''}">
        ${isChecked?`<span style="${_irWr.pastOk?'color:#10B981':'color:#EF4444'};font-size:.8rem;font-weight:600">${_irWr.pastOk?'✓':('→ '+v.past)}</span>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:.75rem">
        <label style="font-size:.85rem;color:#64748B;min-width:5rem">Past Participle:</label>
        <input id="ir-pp" type="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="..." class="gap-input" style="flex:1;font-size:1rem;color:${isChecked?(_irWr.ppOk?'#065F46':'#991B1B'):'#1E293B'}" ${isChecked?'disabled':''} value="${isChecked?(_irWr.ppVal||''):''}">
        ${isChecked?`<span style="${_irWr.ppOk?'color:#10B981':'color:#EF4444'};font-size:.8rem;font-weight:600">${_irWr.ppOk?'✓':('→ '+v.pp)}</span>`:''}
      </div>
    </div>
    ${!isChecked?`<button class="btn-primary" style="background:#F59E0B" onclick="checkIrWrite()">Prüfen ✓</button>`
      :`<button class="btn-primary" style="background:#F59E0B" onclick="nextIrWrite()">${_irWr.idx<14?'Weiter →':'Ergebnis'}</button>`}
  </div>`;
}
function checkIrWrite(){
  const _irPool = _irShuffled.length ? _irShuffled : IRREG;
  const v = _irPool[_irWr.idx];
  const past = document.getElementById('ir-past').value.trim();
  const pp = document.getElementById('ir-pp').value.trim();
  _irWr.pastVal = past;
  _irWr.ppVal = pp;
  _irWr.pastOk = past.toLowerCase()===v.past.toLowerCase();
  _irWr.ppOk = pp.toLowerCase()===(v.pp||'').toLowerCase();
  if(_irWr.pastOk && _irWr.ppOk) _irWr.score++;
  _irWr.checked = true;
  go('irreg','write');
}
function nextIrWrite(){
  _irWr.idx++;
  _irWr.checked = false;
  if(_irWr.idx>=15){ _irWr.done=true; }
  go('irreg','write');
}
function renderIrregWriteDone(){

    <div style="margin-top:1rem;display:flex;gap:.75rem;justify-content:center">

      <button class="btn-primary" style="background:#F59E0B" onclick="go('irreg','list')">Zur Liste</button>
    </div>
  </div>`;
}

let _rState = {id:'', phase:'vocab', answers:[], checked:false};
function renderReadingTask(id){
  const t = READING.find(r=>r.id===id);
  if(!t) return '<p>Nicht gefunden.</p>';
  if(_rState.id!==id){ _rState = {id, phase:'vocab', answers:[], checked:false}; }
  if(_rState.phase==='vocab') return renderReadingVocab(t);
  if(_rState.phase==='pre') return renderReadingPre(t);
  if(_rState.phase==='while') return renderReadingWhile(t);
  if(_rState.phase==='post') return renderReadingPost(t);
  if(_rState.phase==='done') return renderReadingDone(t);
  return '';
}

function _rStepBar(active){
  const steps=['Vokabeln','Pre-Reading','While-Reading','Post-Reading'];
  const nums={vocab:0,pre:1,while:2,post:3,done:4};
  const n=nums[active]||0;
  return `<div style="display:flex;gap:.3rem;margin-bottom:.2rem">
    ${steps.map((_,i)=>`<div style="flex:1;height:.3rem;border-radius:99px;background:${i<n?'#10B981':i===n?'#3B82F6':'#E2E8F0'}"></div>`).join('')}
  </div>
  <p style="font-size:.72rem;color:#94A3B8;margin-bottom:.6rem">Schritt ${n+1} von 4: ${steps[n]||'Fertig'}</p>`;
}

  const preTask = t.preTask ||
    `Schau dir den Titel <strong>"${t.title}"</strong>${typeLabel} an.<br>Was denkst du: Worum könnte es gehen? Was weißt du schon über das Thema?`;

// Schritt 2 – While-Reading (Text + Aufgaben, gist → detail)
function renderReadingWhile(t){
  const isChecked = _rState.checked;
  const gistQs   = t.questions.map((q,i)=>({...q,origIdx:i})).filter(q=>q.gist);
  const detailQs  = t.questions.map((q,i)=>({...q,origIdx:i})).filter(q=>!q.gist);

  const renderQ = (q, num) => {
    const ans = _rState.answers[q.origIdx];
    return `<div>
      <p style="font-weight:600;color:#1E293B;margin-bottom:.4rem">${num}. ${q.q}</p>
      ${q.type==='mc'
        ? q.opts.map(o=>{
            let cls='opt-btn';
            if(isChecked){ if(o===q.ans) cls+=' opt-correct'; else if(o===ans) cls+=' opt-wrong'; }
            else if(o===ans) cls+=' opt-selected';
            return `<button class="${cls}" ${isChecked?'disabled':''} onclick="pickRQ(${q.origIdx},'${escQ(o)}')">${o}</button>`;
          }).join('')
        : ['true','false'].map(val=>{
            let cls='opt-btn';
            if(isChecked){ if(val===q.ans) cls+=' opt-correct'; else if(val===ans) cls+=' opt-wrong'; }
            else if(val===ans) cls+=' opt-selected';
            return `<button class="${cls}" style="display:inline-block;width:48%;margin-right:1%" ${isChecked?'disabled':''} onclick="pickRQ(${q.origIdx},'${val}')">${val==='true'?'True ✓':'False ✗'}</button>`;
          }).join('')
      }
      ${isChecked&&q.exp?`<p style="font-size:.78rem;color:#64748B;margin-top:.2rem;font-style:italic">${q.exp}</p>`:''}
    </div>`;
  };

  let num=0;
  const gistSection = gistQs.length>0 ? `
    <div>
      <p style="font-size:.73rem;font-weight:700;color:#7C3AED;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem">📍 Reading for Gist – Überblick</p>
      <div class="space-y-4">${gistQs.map(q=>renderQ(q,++num)).join('')}</div>
    </div>` : '';

  const detailSection = `
    <div>
      ${gistQs.length>0?`<p style="font-size:.73rem;font-weight:700;color:#0369A1;text-transform:uppercase;letter-spacing:.06em;margin:.75rem 0 .5rem">🔍 Reading for Detail – Genau lesen</p>`:''}
      <div class="space-y-4">${detailQs.map(q=>renderQ(q,++num)).join('')}</div>
    </div>`;

  const correct = t.questions.filter((q,i)=>_rState.answers[i]===q.ans).length;
  return `<div class="space-y-5">
    <div style="display:flex;gap:1rem;align-items:center;flex-wrap:wrap">
      <button onclick="_rState.phase='pre';go('reading-task','${t.id}')" style="background:none;border:none;color:#3B82F6;cursor:pointer">← Pre-Reading</button>
      <h1 style="font-size:1.4rem;font-weight:800;color:#1E293B">While-Reading: ${t.title}</h1>
    </div>
    ${_rStepBar('while')}
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;align-items:start">
      <div class="card" style="background:#FFFBEB;border-color:#FDE68A;max-height:80vh;overflow-y:auto">
        <h3 style="font-weight:700;color:#92400E;margin-bottom:.75rem;font-size:.9rem">📖 ${t.title}</h3>
        <div style="font-size:.88rem;color:#44403C;line-height:1.85;white-space:pre-line">${t.text}</div>
      </div>
      <div class="card space-y-4">
        ${gistSection}
        ${detailSection}
        ${!isChecked
          ? `<div id="reading-err" style="color:#EF4444;font-size:.83rem;font-weight:600;min-height:1.1rem"></div>
             <button class="btn-primary" onclick="checkReading('${t.id}')">Überprüfen ✓</button>`
          : `<div class="${correct===t.questions.length?'feedback-ok':'feedback-info'}" style="margin-top:.25rem">${correct}/${t.questions.length} richtig ✓</div>
             <button class="btn-primary" style="margin-top:.5rem" onclick="_rState.phase='post';go('reading-task','${t.id}')">Weiter: Post-Reading →</button>`
        }
      </div>
    </div>
  </div>`;
}

// Schritt 3 – Post-Reading (Reflexion / Reaktion)
function renderReadingPost(t){
  const correct = t.questions.filter((q,i)=>_rState.answers[i]===q.ans).length;
  const postTask = t.postTask || (t.level==='A2'
    ? `Schreib 1–2 Sätze auf Englisch: Was hast du Neues gelernt? Oder was findest du an dem Text besonders interessant?`
    : `Schreib einen Satz auf Englisch: Was findest du am interessantesten aus dem Text?`);
  return `<div class="space-y-5">
    <div style="display:flex;gap:1rem;align-items:center">
      <button onclick="_rState.phase='while';go('reading-task','${t.id}')" style="background:none;border:none;color:#3B82F6;cursor:pointer">← While-Reading</button>
      <h1 style="font-size:1.4rem;font-weight:800;color:#1E293B">Post-Reading</h1>
    </div>
    ${_rStepBar('post')}
    <div class="card" style="background:#ECFDF5;border-color:#6EE7B7">
      <div class="${correct===t.questions.length?'feedback-ok':'feedback-info'}" style="margin-bottom:.75rem">
        ${correct}/${t.questions.length} Fragen richtig beantwortet
      </div>
      <h2 style="font-weight:700;color:#065F46;margin-bottom:.6rem">✍️ Nach dem Lesen</h2>
      <p style="color:#065F46;font-size:.93rem;line-height:1.6;margin-bottom:.75rem">${postTask}</p>
      <textarea rows="3" style="width:100%;border:1.5px solid #6EE7B7;border-radius:.75rem;padding:.65rem .8rem;font-size:.9rem;resize:vertical;font-family:inherit;outline:none" placeholder="Deine Antwort..."></textarea>
    </div>
    <button class="btn-primary" onclick="finishReading('${t.id}')">Abschließen ✓</button>
  </div>`;
}

function pickRQ(qi, val){
  _rState.answers[qi] = val;
  _rState.phase = 'while';
  go('reading-task', _rState.id);
}

function checkReading(id){
  const t = READING.find(r=>r.id===id);
  const unanswered = t.questions.reduce((n,q,i)=>n+(_rState.answers[i]===undefined?1:0),0);
  if(unanswered>0){
    const el=document.getElementById('reading-err');
    if(el) el.textContent=`⚠️ Bitte beantworte noch ${unanswered} Frage${unanswered>1?'n':''}, bevor du überprüfst.`;
    return;
  }
  _rState.checked=true;
  _rState.phase='while';
  go('reading-task',id);
}

function finishReading(id){
  if(!P.reading.includes(id)) P.reading.push(id);
  addXP(20); checkBadges(); save();
  _rState.phase='done';
  go('reading-task',id);
}

function renderReadingDone(t){
  const correct = t.questions.filter((q,i)=>_rState.answers[i]===q.ans).length;
  const pct = Math.round(correct/t.questions.length*100);
  return `<div class="card" style="text-align:center;padding:2rem">
    <div style="font-size:3rem">${pct===100?'🏆':pct>=60?'👍':'💪'}</div>
    <h2 style="font-size:1.4rem;font-weight:800;color:#1E293B;margin:.5rem 0">Text abgeschlossen!</h2>
    <div style="font-size:2rem;font-weight:800;color:${pct===100?'#10B981':pct>=60?'#3B82F6':'#F59E0B'}">${pct}%</div>
    <p style="color:#64748B;margin:.25rem 0 1rem">${correct}/${t.questions.length} Fragen richtig</p>
    <div style="display:flex;gap:.75rem;justify-content:center">
      <button class="btn-secondary" onclick="_rState={id:'${t.id}',phase:'vocab',answers:[],checked:false};go('reading-task','${t.id}')">Nochmal</button>
      <button class="btn-primary" onclick="go('reading-list')">Alle Texte</button>
    </div>
  </div>`;
}

function updateWP(val){
  _wpState.text = val;
  const minW = _wpState.prompt ? _wpState.prompt.minWords : 50;
  const words = val.trim().split(/\s+/).filter(Boolean).length;
  const spans = document.querySelectorAll('span');
  spans.forEach(s=>{ if(s.textContent.match(/\d+\/\d+ Wörter/)) { s.textContent = words+'/'+minW+' Wörter'; s.style.color=words>=minW?'#10B981':'#94A3B8'; } });
