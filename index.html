function saveWPText(){
  const text = _wpState.text || '';
  const minW = _wpState.prompt ? _wpState.prompt.minWords : 50;
  const words = text.trim().split(/\s+/).filter(Boolean).length;
  const checks = [];
  if(words < minW) checks.push('Noch zu wenig Wörter (mind. '+minW+')');
  const iLower = (text.match(/\bi\b/g)||[]).length;
  if(iLower > 0) checks.push('"i" muss immer groß: "I"');
  if(!/[.!?]\s*$/.test(text.trim())) checks.push('Letzter Satz ohne Satzzeichen');
  const fb = document.getElementById('wp-feedback');
  if(checks.length > 0 && fb){
    fb.innerHTML = '<div class="feedback-err"><strong>Noch prüfen:</strong> '+checks.join(' · ')+'</div>';
    fb.style.display='block'; return;
  }
  if(!P.writing.includes('prompt-free')) P.writing.push('prompt-free');
  addXP(30); checkBadges(); save();
  if(fb){ fb.innerHTML='<div class="feedback-ok">✓ Gespeichert! Gut gemacht.</div>'; fb.style.display='block'; }

function updateWriting(id, val){
  _wState.text = val;
  const t = WRITING.find(w=>w.id===id);
  const words = val.trim().split(/\s+/).filter(Boolean).length;
  const enough = words >= t.min;
  const counter = document.querySelector('[id="writing-area"] ~ *');
  // just re-update word count display
  const spans = document.querySelectorAll('span');
  spans.forEach(s=>{ if(s.textContent.includes('/'+t.min+' Wörter')){ s.textContent = words+'/'+t.min+' Wörter'; s.style.color=enough?'#10B981':'#94A3B8'; } });
}

function toggleWCheck(id, ci){
  _wState.checklist[ci] = !_wState.checklist[ci];
  go('writing-task',id);
  // restore textarea content
  setTimeout(()=>{ const ta=document.getElementById('writing-area'); if(ta) ta.value=_wState.text; },0);
}

const WRITING_KEYWORDS = {
  w1: ['my name is', 'years old', 'i live', 'i like', 'favourite', 'weekend', 'write soon'],
  w2: ['weather', 'yesterday', 'greetings from', 'see you', 'great time'],
  w3: ['saturday', 'sunday', 'first', 'then', 'finally', 'enjoyed', 'favourite'],
  w4: ['once', 'suddenly', 'said', 'because', 'in the end']
};

function submitWriting(id){
  const t = WRITING.find(w=>w.id===id);
  const text = _wState.text;
  const words = text.trim().split(/\s+/).filter(Boolean).length;
  const checks = [];
  // word count
  if(words < t.min) checks.push('⚠ Noch zu wenig Wörter (mind. '+t.min+')');
  // I always capitalized
  const iLower = (text.match(/\bi\b/g)||[]).length;
  if(iLower > 0) checks.push('⚠ "i" muss immer groß geschrieben werden: "I"');
  // ends with punctuation
  if(!/[.!?]\s*$/.test(text.trim())) checks.push('⚠ Letzter Satz ohne Satzzeichen');
  // checklist items
  const checked = (_wState.checklist||[]).filter(Boolean).length;
  const total = (t.checklist||[]).length;
  if(checked < total) checks.push('⚠ Checkliste: noch '+( total-checked)+' Punkte offen');

  // keyword check
  const kws = WRITING_KEYWORDS[id] || [];
  const textLower = text.toLowerCase();
  const kwResults = kws.map(k => ({kw: k, found: textLower.includes(k.toLowerCase())}));
  const missing = kwResults.filter(k => !k.found);

  const fb = document.getElementById('writing-feedback');
  if(fb) {
    let kwHtml = '';
    if(kwResults.length > 0){
      kwHtml = '<div style="margin-top:.5rem"><p style="font-size:.82rem;font-weight:700;color:#1E293B;margin-bottom:.4rem">🔍 Schlüsselwörter:</p><div style="display:flex;flex-wrap:wrap;gap:.3rem">'
        + kwResults.map(k=>`<span style="font-size:.78rem;padding:.2rem .6rem;border-radius:99px;background:${k.found?'#D1FAE5':'#FEE2E2'};color:${k.found?'#065F46':'#991B1B'};font-weight:600">${k.found?'✅':'❌'} ${k.kw}</span>`).join('')
        + '</div></div>';
    }
    if(checks.length > 0){
      fb.innerHTML = '<div class="feedback-err" style="margin-bottom:.75rem"><strong>Bitte noch prüfen:</strong><ul style="margin:.4rem 0 0 1.2rem">'+checks.map(c=>'<li style="font-size:.85rem">'+c+'</li>').join('')+'</ul>'+kwHtml+'</div>';
      fb.style.display='block';
      return;
    } else if(missing.length > 0){
      fb.innerHTML = '<div style="background:#FFF7ED;border:1px solid #FED7AA;border-radius:.75rem;padding:.75rem;margin-bottom:.75rem">'+kwHtml+'<p style="font-size:.8rem;color:#92400E;margin-top:.4rem">Du kannst trotzdem abgeben — versuche aber noch, die roten Wörter einzubauen.</p></div>';
      fb.style.display='block';
    } else {
      fb.innerHTML = '<div class="feedback-ok" style="margin-bottom:.75rem">'+kwHtml+'</div>';
      fb.style.display='block';
    }
  }
  if(!P.writing.includes(id)) P.writing.push(id);
  addXP(30); checkBadges(); save();
  go('writing-task',id);
}

  _lState.checked = true;

let _ts = {items:[], idx:0, done:false, minutes:10};

function buildSessionItems(minutes){
  const counts = {5:{g:1,v:1,r:1},10:{g:2,v:2,r:1},15:{g:3,v:2,r:1,w:1},20:{g:3,v:3,r:2,w:1}};
  const plan = counts[minutes]||counts[10];
  const items = [];
  const gTopics = [...GRAMMAR].sort(()=>Math.random()-.5);
  let gCount = 0;
  for(const t of gTopics){
    if(gCount >= (plan.g||2)) break;
    const gPool=GRAMMAR_POOL[t.id]||[];
    const mcPicks=gPool.filter(e=>e.type==='mc');
    if(mcPicks.length){
      const rnd=mcPicks[Math.floor(Math.random()*mcPicks.length)];
      const rndId=rnd.id;
      items.push({type:'grammar',label:'📚 '+t.title,go:function(){go('grammar-exercise',t.id,rndId);}});
      gCount++;
    }
  }
  const vTopics = [...VOCAB].sort(()=>Math.random()-.5).slice(0, plan.v||2);
  for(const v of vTopics){
    items.push({type:'vocab', label:'🔤 ' + v.title, go:function(){ go('vocab-topic',v.id,'flashcard'); }});
  }
  if(plan.r){
    const rTexts = [...READING].sort(()=>Math.random()-.5).slice(0, plan.r);
    for(const r of rTexts){
      items.push({type:'reading', label:'📖 ' + r.title, go:function(){ go('reading-task',r.id); }});
    }
  }
  if(plan.w){
    items.push({type:'writing', label:'\u270F\uFE0F Freies Schreiben', go:function(){ go('writing-prompts'); }});
  }
  return items.sort(()=>Math.random()-.5);
}

function startTimedSession(minutes){
  _ts = {items: buildSessionItems(minutes), idx:0, done:false, minutes};
  go('timed-session');
}

function renderTimedSession(){
  if(_ts.items.length===0){
    return '<div class="card" style="text-align:center;padding:2rem"><p>Keine Aufgaben gefunden.</p><button class="btn-primary" onclick="go(\'home\')">Zur Startseite</button></div>';
  }
  if(_ts.done){
    return `<div class="card space-y-5" style="text-align:center;padding:2rem">
      <div style="font-size:3rem">&#127881;</div>
      <h2 style="font-size:1.4rem;font-weight:800;color:#1E293B">Session abgeschlossen!</h2>
      <p style="color:#64748B">Du hast alle ${_ts.items.length} Aufgaben erledigt. Gut gemacht!</p>
      <div style="display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap">
        <button class="btn-secondary" onclick="go('home')">&#8592; Startseite</button>
        <button class="btn-primary" style="background:#16A34A" onclick="startTimedSession(${_ts.minutes})">Nochmal ${_ts.minutes} Min.</button>
      </div>
    </div>`;
  }
  const total = _ts.items.length;
  const pct = Math.round(_ts.idx/total*100);
  return `<div class="space-y-6">
    <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
      <button onclick="go('home')" style="background:none;border:none;color:#3B82F6;cursor:pointer;font-size:.9rem">&#8592; Abbrechen</button>
      <div>
        <h1 style="font-size:1.4rem;font-weight:800;color:#1E293B">&#9201;&#65039; ${_ts.minutes}-Minuten-Session</h1>
        <p style="color:#64748B;font-size:.85rem">${_ts.idx} von ${total} Aufgaben erledigt</p>
      </div>
    </div>
    ${pct>0?`<div style="background:#E2E8F0;border-radius:99px;height:.5rem;overflow:hidden"><div style="background:#16A34A;height:100%;width:${pct}%;transition:width .4s"></div></div>`:''}
    <div style="display:flex;flex-direction:column;gap:.75rem">
      ${_ts.items.map((item,i)=>{
        const isDone = i < _ts.idx;
        const isCur  = i === _ts.idx;
        return `<div style="background:${isDone?'#F0FDF4':isCur?'#EFF6FF':'#F8FAFC'};border:2px solid ${isDone?'#86EFAC':isCur?'#BFDBFE':'#F1F5F9'};border-radius:1rem;padding:1rem;display:flex;align-items:center;gap:1rem;${isCur?'cursor:pointer;':''}opacity:${isDone||isCur?'1':'.55'}"
          ${isCur?`onclick="tsGo(${i})"`:''} ${isCur?`onmouseover="this.style.borderColor='#3B82F6'" onmouseout="this.style.borderColor='#BFDBFE'"`:''}>
          <div style="font-size:1.4rem">${isDone?'&#9989;':isCur?'&#9654;&#65039;':'&#8987;'}</div>
          <div style="flex:1">
            <p style="font-weight:600;color:#1E293B;font-size:.9rem">${item.label}</p>
            <p style="font-size:.75rem;color:#64748B">${isDone?'Erledigt':isCur?'Jetzt starten &#8594;':'Noch nicht an der Reihe'}</p>
          </div>
        </div>`;
      }).join('')}
    </div>
    <button class="btn-primary" style="width:100%;background:#16A34A" onclick="tsGo(${_ts.idx})">
      Jetzt: ${_ts.items[_ts.idx].label} &#8594;
    </button>
  </div>`;
}

function tsGo(i){
  _ts._cur = i;
  _ts.items[i].go();
}

function tsReturn(){
  if(_ts._cur !== undefined){
    _ts.idx = _ts._cur + 1;
    if(_ts.idx >= _ts.items.length) _ts.done = true;
  }
  go('timed-session');
}

function evalBadge(id){
  const gs = grammarStats();
  switch(id){
    case 'grammar-starter': return gs.done>=1;
    case 'grammar-pro': return gs.done>=5;
    case 'vocab-hero': return Object.values(P.vocab).some(v=>v.tested);
    case 'reading-detective': return P.reading.length>=1;
    case 'listening-pro': return P.listening.length>=1;
    case 'writing-explorer': return P.writing.length>=1;
    case 'irreg-champ': return (P.irreg||[]).length>=20;
    case 'simple-past-master': return !!(P.grammar['past']&&P.grammar['past'].completed);
    case 'streak-3': return P.streak>=3;
    case 'all-rounder': return gs.done>=1&&Object.values(P.vocab).some(v=>v.tested)&&P.reading.length>=1&&P.writing.length>=1;
    default: return false;
  }
}

      ${FAQ.map((f,i)=>`<div id="faq-${i}" style="border-bottom:1px solid #F1F5F9">
        <button onclick="toggleFAQ(${i})" style="width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:.85rem 0;display:flex;justify-content:space-between;align-items:center">
          <span style="font-weight:600;color:#1E293B;font-size:.9rem">${f.q}</span>
          <span id="faq-arrow-${i}" style="color:#94A3B8;flex-shrink:0;margin-left:.75rem">▼</span>
        </button>
        <div id="faq-body-${i}" style="display:none;padding-bottom:.85rem;font-size:.9rem;color:#44403C;line-height:1.7">${f.a}</div>
      </div>`).join('')}
    </div>

    <div class="card" style="background:#ECFDF5;border-color:#6EE7B7">
      <h2 style="font-weight:700;color:#065F46;margin-bottom:.75rem">💡 Lerntipps</h2>
      <ul style="space-y:8px">
        ${[
          'Lerne jeden Tag 10–15 Minuten – Regelmäßigkeit schlägt lange Lernmarathons.',
          'Sprich Englisch laut aus, auch wenn niemand zuhört.',
          'Schreibe neue Vokabeln in ein Heft mit einem eigenen Beispielsatz.',
          'Sieh englische Serien oder Videos mit englischen Untertiteln.',
          'Nutze die Streak-Funktion als Motivation, jeden Tag dabei zu bleiben.',
        ].map(t=>`<li style="display:flex;gap:.5rem;font-size:.9rem;color:#1E293B;margin-bottom:.5rem"><span style="color:#10B981;flex-shrink:0">✓</span>${t}</li>`).join('')}
      </ul>
    </div>
  </div>`;
}

function toggleFAQ(i){
  const body = document.getElementById('faq-body-'+i);
  const arrow = document.getElementById('faq-arrow-'+i);
  if(body.style.display==='none'){ body.style.display='block'; arrow.textContent='▲'; }
  else { body.style.display='none'; arrow.textContent='▼'; }
}

      <div style="display:flex;flex-direction:column;gap:.5rem">
        ${cat.items.map(l=>`<a href="${l.url}" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:1rem;padding:.75rem 1rem;background:#F8FAFC;border-radius:.75rem;text-decoration:none;transition:all .15s" onmouseover="this.style.background='#EFF6FF'" onmouseout="this.style.background='#F8FAFC'">
