// ═══════════════════════════════════════════════
// DATA

// ═══════════════════════════════════════════════
// VERSION & CHANGELOG
// Bei jedem neuen Upload:
//  1) APP_VERSION erhöhen (z.B. '1.1')
//  2) Oben in CHANGELOG einen neuen Eintrag ergänzen
//  3) In sw.js die CACHE-Zahl erhöhen (sonst lädt die App die alte Datei!)
// Die SuS sehen die Version unten rechts und bekommen
// beim ersten Öffnen der neuen Version ein Update-Pop-up.
// ═══════════════════════════════════════════════
const APP_VERSION = '1.1';
const CHANGELOG = [
  { v:'1.1', date:'2026', items:[
    'Alle SOUL-Bausteine als Vokabeln ergänzt (Klasse 5: Holidays, Party; Klasse 6: Maple Hill, Christmas, Peacemakers, Pip).',
    'Neuer A1-Grundwortschatz: häufige Verben, Adjektive, Zahlen, Farben, Tage/Monate/Zeit und kleine Wörter.',
    'Neue Seite Wörterbucharbeit (Dictionary Skills).',
    'Vokabel-Suchfeld und Druckansicht (A4).',
    'Größere Schrift wirkt jetzt auf die ganze App.',
    'Die App aktualisiert sich automatisch, wenn das Gerät online ist.',
  ]},
  { v:'1.0', date:'2026', items:[
    'Erste Beta-Version des English Companion.',
  ]},
  // Beispiel für den nächsten Upload:
  // { v:'1.1', date:'2026', items:[
  //   'Hangman: Beispielsatz am Ende ergänzt.',
  //   'Vokabeln: Tabelle auf dem Handy lesbarer.',
  // ]},
];

// ═══════════════════════════════════════════════
// LEHRKRÄFTE – hier einfach Namen pflegen.
// Aus "Vorname Nachname" wird automatisch
// vorname.nachname@esz-baddueben.de
// Umlaute werden ersetzt (ä→ae, ö→oe, ü→ue, ß→ss).
// ═══════════════════════════════════════════════
const TEACHER_DOMAIN = 'esz-baddueben.de';
const TEACHER_NAMES = [
  'Leonart Schmitt',
  // weitere Lehrkräfte hier ergänzen, z.B.:
  // 'Anna Müller',
  // 'Tom Becker',
];
function teacherEmailFromName(name){
  const map = {'ä':'ae','ö':'oe','ü':'ue','ß':'ss','Ä':'ae','Ö':'oe','Ü':'ue'};
  const slug = (name||'').trim().toLowerCase()
    .replace(/[äöüßÄÖÜ]/g, ch=>map[ch]||ch)
    .replace(/[^a-z\s.-]/g,'')
    .replace(/\s+/g,'.');
  return slug ? slug + '@' + TEACHER_DOMAIN : '';
}
function teacherOptions(){
  return TEACHER_NAMES.map(n=>({name:n, email:teacherEmailFromName(n)}));
}

const GRAMMAR = [
  { id:'sp', slug:'sp', title:'Simple Present', level:'A1', cls:5, cat:'Tenses',
    desc:'Gewohnheiten, Fakten, regelmäßige Handlungen', descEN:'Habits, facts and regular actions',
    exDE:['Das Simple Present benutzt du für Dinge, die regelmäßig passieren oder immer wahr sind: Gewohnheiten, Hobbys, Fakten.',
           'Für I/you/we/they nimmst du die Grundform des Verbs. Für he/she/it hängst du -s oder -es an.',
           'Verneinung: don\'t (I/you/we/they) + Grundform oder doesn\'t (he/she/it) + Grundform.',
           'Fragen: Do / Does + Subjekt + Grundform?'],
    exEN:['Use the Simple Present for habits, routines and general truths.',
           'For he/she/it: add -s or -es. For I/you/we/they: use the base form.',
           'Negatives: don\'t / doesn\'t + base form. Questions: Do / Does + subject + base form?'],
    examples:[
      {en:'I play football every Saturday.',de:'Ich spiele jeden Samstag Fußball.'},
      {en:'She reads books in the evening.',de:'Sie liest abends Bücher.'},
      {en:'They don\'t like pizza.',de:'Sie mögen keine Pizza.'},
      {en:'Does he speak French?',de:'Spricht er Französisch?'},
      {en:'Water boils at 100 degrees.',de:'Wasser kocht bei 100 Grad.'}
    ],
    mistakes:[
      {wrong:'She play tennis.',correct:'She plays tennis.',tip:'With he/she/it, always add -s to the verb!'},
      {wrong:'He don\'t like cats.',correct:'He doesn\'t like cats.',tip:'With he/she/it use "doesn\'t", not "don\'t".'},
      {wrong:'Does she plays football?',correct:'Does she play football?',tip:'After does/doesn\'t use the base form – no -s!'}
    ],
    exercises:[
      { id:'sp-mc-1', type:'mc', diff:1, title:'Level 1 – Start: Choose the correct form',
        questions:[
          {q:'Tom ___ football every day.',opts:['play','plays','playing','is play'],correct:1,exp:'Tom = he/she/it → plays'},
          {q:'We ___ to school by bus.',opts:['goes','going','go','goed'],correct:2,exp:'We → base form: go'},
          {q:'She ___ her room on Saturdays.',opts:['clean','cleans','is cleaning','cleaned'],correct:1,exp:'she → cleans'},
          {q:'They ___ TV in the evenings.',opts:['watches','watch','is watching','watchs'],correct:1,exp:'They → base form: watch'},
          {q:'My cat ___ on the sofa all day.',opts:['sleep','sleeps','sleeping','sleeped'],correct:1,exp:'My cat = it → sleeps'}
        ]
      },
      { id:'sp-fg-1', type:'fg', diff:1, title:'Level 1 – Start: Fill the gaps',
        sentences:[
          {pre:'I',suf:'football on Fridays. (play)',ans:'play',hint:'I → base form'},
          {pre:'She',suf:'her teeth every morning. (brush)',ans:'brushes',hint:'she → +es'},
          {pre:'We',suf:'in London. (live)',ans:'live',hint:'we → base form'},
          {pre:'He',suf:'to music in his room. (listen)',ans:'listens',hint:'he → +s'},
          {pre:'They',suf:'a dog. (have)',ans:'have',hint:'they → have (nicht haves!)'}
        ]
      },
      { id:'sp-mc-2', type:'mc', diff:2, title:'Level 2 – Training: Negatives & questions',
        questions:[
          {q:'She ___ like broccoli.',opts:['don\'t','doesn\'t','isn\'t','not'],correct:1,exp:'she → doesn\'t + base form'},
          {q:'___ your parents work in an office?',opts:['Does','Do','Are','Is'],correct:1,exp:'"your parents" = they → Do'},
          {q:'My brother ___ play guitar, but he sings.',opts:['don\'t','isn\'t','doesn\'t','not'],correct:2,exp:'"My brother" = he → doesn\'t'},
          {q:'___ she go to the gym every week?',opts:['Do','Does','Is','Has'],correct:1,exp:'she → Does'},
          {q:'I ___ eat meat. I\'m a vegetarian.',opts:['doesn\'t','not','don\'t','isn\'t'],correct:2,exp:'I → don\'t + base form'}
        ]
      },
      { id:'sp-wo-1', type:'wo', diff:3, title:'Level 3 – Challenge: Build sentences',
        items:[
          {phrases:['I','usually','have breakfast','at half seven.'],correct:'I usually have breakfast at half seven.',hint:'Time expressions often go at the end.'},
          {phrases:['Anna',"doesn't do",'sport','on school mornings.'],correct:"Anna doesn't do sport on school mornings.",hint:'Negative: doesn\'t + base form'},
          {phrases:['What','do you','do','after school?'],correct:'What do you do after school?',hint:'Wh-question: question word + auxiliary + subject + verb'},
          {phrases:['They','train','twice a week.'],correct:'They train twice a week.'}
        ]
      }
    ]
  },
  { id:'past', slug:'past', title:'Simple Past', level:'A2', cls:6, cat:'Tenses',

  { id:'r7', title:'A Weekend in Berlin', level:'A2', type:'Reisebericht', topic:'Travel & Cities',
    vocab:[{en:'capital',de:'die Hauptstadt',example:'Berlin is the capital of Germany.'},{en:'memorial',de:'das Denkmal',example:'The Holocaust Memorial in Berlin is very moving.'},{en:'incredible',de:'unglaublich',example:'The Brandenburg Gate is an incredible landmark.'},{en:'exhausted',de:'erschöpft'},{en:'recommend',de:'empfehlen',pos:'v',example:'I would definitely recommend visiting Berlin to everyone.'}],
    text:`Last weekend, my family and I visited Berlin, the capital of Germany. We went by train and arrived on Friday evening. Our hotel was right in the centre of the city, which was perfect.
On Saturday morning, we visited the Brandenburg Gate. It\'s one of the most famous landmarks in Europe and it was really impressive. Then we walked to the Holocaust Memorial. It was a very moving experience – there are 2,711 concrete blocks of different heights and you can walk between them. I felt very small and emotional.
In the afternoon, we took a boat trip on the River Spree. From the boat, we could see lots of important buildings. In the evening, we ate at a Vietnamese restaurant near our hotel. The food was delicious.
On Sunday, we visited Museum Island. There are five world-famous museums there! We could only go to two because we didn\'t have enough time. My favourite was the Pergamon Museum. By Sunday evening, we were completely exhausted but very happy. I would definitely recommend Berlin to everyone!`,

    text:`Three weeks ago, an exchange student called Marcus came to stay with us. He\'s from Manchester, England, and he\'s going to be here for six weeks.

function getWeekNum(){
  const d = new Date(); d.setHours(0,0,0,0);
  d.setDate(d.getDate()+4-(d.getDay()||7));
  const y = new Date(d.getFullYear(),0,1);
  return Math.ceil((((d-y)/86400000)+1)/7);
}
function getWeekChallenge(){
  const wn = getWeekNum();
  if(!P.weekChallenge) P.weekChallenge = {week:0, done:[]};
  if(P.weekChallenge.week !== wn){ P.weekChallenge = {week:wn, done:[]}; save(); }
  const uncompleted = GRAMMAR.filter(t=>!(P.grammar[t.id]&&P.grammar[t.id].completed));
  const pool = uncompleted.length > 0 ? uncompleted : GRAMMAR;
  const target = pool[wn % pool.length];
  return {target, wc: P.weekChallenge};
}
function wcToggle(idx){
  if(!P.weekChallenge) P.weekChallenge = {week:getWeekNum(), done:[]};
  const i = P.weekChallenge.done.indexOf(idx);
  if(i === -1) P.weekChallenge.done.push(idx);
  else P.weekChallenge.done.splice(i,1);
  save();
  document.getElementById('app').innerHTML = render(_state);
}
function checkStreak(){
  const today = new Date().toISOString().slice(0,10);
  if(P.lastDate === today) return;
  const yest = new Date(Date.now()-86400000).toISOString().slice(0,10);
  P.streak = P.lastDate === yest ? P.streak + 1 : 1;
  P.lastDate = today;
  save();
}
function addXP(n){ P.xp = (P.xp||0) + n; save(); }
function grammarStats(){
  return { done: Object.values(P.grammar).filter(g=>g.completed).length, total: GRAMMAR.length };
}
function checkBadges(){
  const add = id => { if(!P.badges.includes(id)){ P.badges.push(id); save(); } };
  const gs = grammarStats();
  if(gs.done >= 1) add('grammar-starter');
  if(gs.done >= 5) add('grammar-pro');
  if(Object.values(P.vocab).some(v=>v.tested)) add('vocab-hero');
  if(P.reading.length >= 1) add('reading-detective');
  if(P.listening.length >= 1) add('listening-pro');
  if(P.writing.length >= 1) add('writing-explorer');
  if(P.irreg.length >= 20) add('irreg-champ');
  if(P.grammar['past'] && P.grammar['past'].completed) add('simple-past-master');
  if(P.streak >= 3) add('streak-3');
  const gs2 = grammarStats();
  if(gs2.done>=1 && Object.values(P.vocab).some(v=>v.tested) && P.reading.length>=1 && P.writing.length>=1) add('all-rounder');
}

  document.querySelectorAll('.nav-link').forEach(el=>{

    const gamesSecs = ['spiele','wordsearch','hangman','vocab-memory','irreg-memory','grammar-quickfire','grammar-wortarten-quiz'];
    let match = sec === section;
    if(sec === 'spiele' && gamesSecs.includes(section)) match = true;

    if(sec === 'writing-list' && (section==='writing-task'||section==='writing-haiku'||section==='writing-acrostic'||section==='writing-prompts')) match = true;

  window.scrollTo(0,0);

  const errors = P.errors || {};
  return Object.entries(errors)
    .map(([key, count]) => {
      const [type, id] = key.split(':');
      let label = '', link = '';
      if(type === 'grammar'){
        const t = GRAMMAR.find(g=>g.id===id);
        label = t ? '📚 ' + t.title : ''; link = `go('grammar-topic','${id}')`;

        const t = VOCAB.find(v=>v.id===id);
        label = t ? '🔤 ' + t.title : ''; link = `go('vocab-topic','${id}')`;
      }
      return {label, count, link};

    .filter(a => a.label)
    .sort((a,b) => b.count - a.count)
    .slice(0, 3);

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:.75rem">
        ${nextG ? `<div onclick="go('grammar-topic','${nextG.id}')" class="card" style="cursor:pointer;display:flex;align-items:center;gap:1rem;padding:1rem">
          <div style="width:2.5rem;height:2.5rem;background:#DBEAFE;border-radius:.75rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.1rem">📚</div>
          <div style="flex:1"><p style="font-size:.7rem;color:#94A3B8">${T('label_grammar')}</p><p style="font-weight:600;color:#1E293B">${nextG.title}</p><p style="font-size:.75rem;color:#64748B">${gDesc(nextG)}</p></div>
          <span style="color:#93C5FD">›</span>
        </div>` : ''}
        ${nextV ? `<div onclick="go('vocab-topic','${nextV.id}')" class="card" style="cursor:pointer;display:flex;align-items:center;gap:1rem;padding:1rem">
          <div style="width:2.5rem;height:2.5rem;background:#D1FAE5;border-radius:.75rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.3rem">${nextV.emoji}</div>
          <div style="flex:1"><p style="font-size:.7rem;color:#94A3B8">${T('label_vocab')}</p><p style="font-weight:600;color:#1E293B">${nextV.title}</p><p style="font-size:.75rem;color:#64748B">${nextV.words.length} ${T('label_words')}</p></div>
          <span style="color:#6EE7B7">›</span>
        </div>` : ''}
        <div onclick="go('reading-list')" class="card" style="cursor:pointer;display:flex;align-items:center;gap:1rem;padding:1rem">
          <div style="width:2.5rem;height:2.5rem;background:#EDE9FE;border-radius:.75rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.1rem">📖</div>
          <div style="flex:1"><p style="font-size:.7rem;color:#94A3B8">Reading</p><p style="font-weight:600;color:#1E293B">${T('home_readings')}</p><p style="font-size:.75rem;color:#64748B">A1 + A2</p></div>

        <div onclick="go('irreg','list')" class="card" style="cursor:pointer;display:flex;align-items:center;gap:1rem;padding:1rem">
          <div style="width:2.5rem;height:2.5rem;background:#FFFBEB;border-radius:.75rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.1rem">📋</div>
          <div style="flex:1"><p style="font-size:.7rem;color:#94A3B8">${T('home_irreg_short')}</p><p style="font-weight:600;color:#1E293B">${T('nav_irreg')}</p><p style="font-size:.75rem;color:#64748B">${P.irreg.length}/30 ${T('irreg_learned')}</p></div>
          <span style="color:#FCD34D">›</span>
        </div>
        <div onclick="go('practice')" class="card" style="cursor:pointer;display:flex;align-items:center;gap:1rem;padding:1rem">
          <div style="width:2.5rem;height:2.5rem;background:#FFEDD5;border-radius:.75rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.1rem">⚡</div>
          <div style="flex:1"><p style="font-size:.7rem;color:#94A3B8">${T('home_quick')}</p><p style="font-weight:600;color:#1E293B">${T('home_quick_lbl')}</p><p style="font-size:.75rem;color:#64748B">${T('home_quick_mix')}</p></div>

    </div>
  </div>`;
}

// GRAMMAR
// ═══════════════════════════════════════════════
function renderWortarten(){
  const isDE = (P.lang||'en2')==='de';
  const sections=[
    {id:'noun',emoji:'🧩',title:'Nouns',color:'#EFF6FF',border:'#BFDBFE',accent:'#1E40AF',
     intro:isDE?'Nomen bezeichnen Personen, Tiere, Dinge oder abstrakte Begriffe. Im Englischen werden Nomen <strong>nicht großgeschrieben</strong> (außer am Satzanfang und bei Eigennamen).':'Nouns name people, animals, things or abstract ideas. In English, nouns are <strong>not capitalised</strong> (except at the start of a sentence and for proper nouns).',
     rows:isDE?[
       ['Singular (Einzahl)','a dog, the book, a city'],
       ['Plural (Mehrzahl)','dogs, books, cities — meist + s/es'],
       ['Eigennamen (immer groß)','London, Emma, Monday, English'],
       ['Zählbar / Nicht zählbar','a chair (zählbar) vs. water, music (nicht zählbar)'],
       ['Artikel','a/an = unbestimmt &nbsp;·&nbsp; the = bestimmt'],
     ]:[
       ['Singular','a dog, the book, a city'],
       ['Plural','dogs, books, cities — usually + s/es'],
       ['Proper nouns (always capital)','London, Emma, Monday, English'],
       ['Countable / Uncountable','a chair (countable) vs. water, music (uncountable)'],
       ['Articles','a/an = indefinite &nbsp;·&nbsp; the = definite'],
     ],
     examples:['I have <u>a dog</u>.','The <u>book</u> is on the table.','<u>Emma</u> lives in <u>London</u>.']
    },
    {id:'verb',emoji:'⚡',title:'Verbs',color:'#FFF7ED',border:'#FED7AA',accent:'#92400E',
     intro:isDE?'Verben drücken Handlungen, Vorgänge oder Zustände aus. Im Englischen verändert sich das Verb je nach Zeitform und Person.':'Verbs express actions, events or states. In English, the verb form changes depending on tense and person.',
     rows:[
       ['Simple Present','I play · he play<strong>s</strong>'],
       ['Simple Past','I play<strong>ed</strong> / go → went (irreg.)'],
       ['Present Progressive','I <strong>am playing</strong> · she <strong>is</strong> play<strong>ing</strong>'],
       ['Going-to Future','I <strong>am going to</strong> play'],
       ['Present Perfect','I <strong>have played</strong> · she <strong>has</strong> play<strong>ed</strong>'],
       [isDE?'Modal Verbs – Modalverben':'Modal Verbs','can, must, should, will, may + infinitive'],
     ],
     examples:['She <u>plays</u> football every day.','We <u>went</u> to the cinema yesterday.','He <u>is reading</u> a book right now.']
    },
    {id:'adj',emoji:'🎨',title:'Adjectives',color:'#F0FDF4',border:'#6EE7B7',accent:'#065F46',
     intro:isDE?'Adjektive beschreiben Nomen. Im Englischen stehen Adjektive <strong>vor dem Nomen</strong>. Sie verändern ihre Form nicht (kein Genus, kein Kasus).':'Adjectives describe nouns. In English, adjectives go <strong>before the noun</strong>. They do not change their form (no gender, no case).',
     rows:isDE?[
       ['Attributiv (vor Nomen)','a <strong>tall</strong> girl, an <strong>old</strong> house'],
       ['Prädikativ (nach to be)','She is <strong>tall</strong>. The house is <strong>old</strong>.'],
       ['Komparativ (Vergleich)','tall → tall<strong>er</strong> · good → <strong>better</strong>'],
       ['Superlativ (höchste Stufe)','tall → <strong>the tallest</strong> · good → <strong>the best</strong>'],
       ['Mehrs. Adjektive','interesting → more interesting / the most interesting'],
     ]:[
       ['Attributive (before noun)','a <strong>tall</strong> girl, an <strong>old</strong> house'],
       ['Predicative (after to be)','She is <strong>tall</strong>. The house is <strong>old</strong>.'],
       ['Comparative','tall → tall<strong>er</strong> · good → <strong>better</strong>'],
       ['Superlative','tall → <strong>the tallest</strong> · good → <strong>the best</strong>'],
       ['Long adjectives','interesting → more interesting / the most interesting'],
     ],
     examples:['I have a <u>new</u> bike.','The film was <u>boring</u>.','She is <u>taller</u> than her brother.']
    },
    {id:'adv-freq',emoji:'🔁',title:'Adverbs of Frequency',color:'#FAF5FF',border:'#C4B5FD',accent:'#5B21B6',
     intro:isDE?'Diese Adverbien sagen, <strong>wie oft</strong> etwas passiert. Sie stehen meist <strong>vor dem Hauptverb</strong>, aber <strong>nach</strong> to be.':'These adverbs say <strong>how often</strong> something happens. They usually go <strong>before the main verb</strong>, but <strong>after</strong> to be.',
     rows:[
       ['always',isDE?'immer (100 %)':'always (100%)'],
       ['usually / normally',isDE?'meistens (~80 %)':'most of the time (~80%)'],
       ['often',isDE?'oft (~60 %)':'often (~60%)'],
       ['sometimes',isDE?'manchmal (~40 %)':'sometimes (~40%)'],
       ['rarely / seldom',isDE?'selten (~20 %)':'rarely (~20%)'],
       ['never',isDE?'nie (0 %)':'never (0%)'],
     ],
     examples:['I <u>always</u> brush my teeth.','She <u>sometimes</u> watches TV.','He is <u>never</u> late.','They <u>often</u> play football at the weekend.']
    },
    {id:'adv-time',emoji:'⏰',title:'Adverbs of Time',color:'#FFFBEB',border:'#FDE68A',accent:'#92400E',
     intro:isDE?'Zeitadverbien sagen, <strong>wann</strong> etwas passiert. Sie stehen am <strong>Satzanfang</strong> oder <strong>Satzende</strong> — nicht in der Satzmitte.':'Time adverbs say <strong>when</strong> something happens. They go at the <strong>start or end</strong> of the sentence — not in the middle.',
     rows:isDE?[
       ['Vergangenheit','yesterday, last week, two days ago, in 2020'],
       ['Gegenwart','today, now, at the moment, this week'],
       ['Zukunft','tomorrow, next Monday, in three days, soon'],
       ['Sonstiges','recently, already, yet, still, just'],
     ]:[
       ['Past','yesterday, last week, two days ago, in 2020'],
       ['Present','today, now, at the moment, this week'],
       ['Future','tomorrow, next Monday, in three days, soon'],
       ['Other','recently, already, yet, still, just'],
     ],
     examples:['<u>Yesterday</u>, we went to the park.','She is watching TV <u>at the moment</u>.<br><em>'+(isDE?'Tipp: Zeitadverbien können auch am Satzanfang stehen: <u>Every day</u>, my sister plays the guitar.':'Tip: Time adverbs can also go at the start: <u>Every day</u>, my sister plays the guitar.')+'</em>']
    },
    {id:'adv-manner',emoji:'🎯',title:'Adverbs of Manner',color:'#FFF1F2',border:'#FECDD3',accent:'#9F1239',
     intro:isDE?'Modaladverbien beschreiben, <strong>wie</strong> etwas passiert. Sie stehen meist <strong>nach dem Verb</strong> (oder nach dem Objekt). Bildung: Adjektiv + <strong>-ly</strong>.':'Adverbs of manner describe <strong>how</strong> something happens. They usually go <strong>after the verb</strong> (or after the object). Form: adjective + <strong>-ly</strong>.',
     rows:[
       ['quick → quickly',isDE?'schnell':'fast'],
       ['careful → carefully',isDE?'sorgfältig':'carefully'],
       ['loud → loudly',isDE?'laut':'loudly'],
       ['good → well',isDE?'gut (Ausnahme!)':'well (exception!)'],
       ['hard → hard',isDE?'hart / angestrengt (kein -ly)':'hard (no -ly)'],
       ['fast → fast',isDE?'schnell (kein -ly)':'fast (no -ly)'],
     ],
     examples:['She sings <u>beautifully</u>.','He works very <u>hard</u>.','Please speak <u>slowly</u>.']
    },
    {id:'prep',emoji:'📍',title:'Prepositions',color:'#ECFDF5',border:'#A7F3D0',accent:'#065F46',
     intro:isDE?'Präpositionen zeigen <strong>Ort, Zeit oder Richtung</strong> an. Die wichtigsten drei für Zeit und Ort:':'Prepositions show <strong>place, time or direction</strong>. The most important ones for time and place:',
     rows:[
       ['at',isDE?'Uhrzeit, Orte (Punkt): <em>at 3 o\'clock, at school, at home</em>':'times, specific places: <em>at 3 o\'clock, at school, at home</em>'],
       ['on',isDE?'Wochentage, Daten, Flächen: <em>on Monday, on 5th May, on the table</em>':'days, dates, surfaces: <em>on Monday, on 5th May, on the table</em>'],
       ['in',isDE?'Monate, Jahre, Räume: <em>in July, in 2020, in the room, in Berlin</em>':'months, years, rooms: <em>in July, in 2020, in the room, in Berlin</em>'],
       ['to',isDE?'Richtung/Ziel: <em>go to school, travel to London</em>':'direction/destination: <em>go to school, travel to London</em>'],
       ['from',isDE?'Herkunft: <em>I\'m from Germany</em>':'origin: <em>I\'m from Germany</em>'],
       ['with',isDE?'Begleitung/Mittel: <em>with friends, write with a pen</em>':'company/means: <em>with friends, write with a pen</em>'],
     ],
     examples:['I go to school <u>at</u> 7:30.','We have English <u>on</u> Tuesdays.','She lives <u>in</u> Berlin.']
    },
    {id:'pronoun',emoji:'👤',title:'Pronouns',color:'#F5F3FF',border:'#C4B5FD',accent:'#4C1D95',
     intro:isDE?'Pronomen ersetzen Nomen. Im Englischen gibt es <strong>Subjekt-</strong> und <strong>Objektpronomen</strong> sowie Possessivpronomen.':'Pronouns replace nouns. In English there are <strong>subject</strong> and <strong>object pronouns</strong> as well as possessive pronouns.',
     rows:isDE?[
       ['Subjekt','I, you, he, she, it, we, they'],
       ['Objekt','me, you, him, her, it, us, them'],
       ['Possessiv (Attribut)','my, your, his, her, its, our, their'],
       ['Possessiv (allein)','mine, yours, his, hers, its, ours, theirs'],
       ['Reflexiv','-self / -selves: myself, yourself, himself ...'],
     ]:[
       ['Subject','I, you, he, she, it, we, they'],
       ['Object','me, you, him, her, it, us, them'],
       ['Possessive (before noun)','my, your, his, her, its, our, their'],
       ['Possessive (standalone)','mine, yours, his, hers, its, ours, theirs'],
       ['Reflexive','-self / -selves: myself, yourself, himself ...'],
     ],
     examples:['<u>She</u> likes <u>him</u>.','Is this book <u>yours</u>?','<u>He</u> hurt <u>himself</u>.']
    },
  ];
  // Check for active grammar exercise
  const hasActiveEx = _ex && _ex.topicId && _ex.state !== 'done' && _ex.state !== undefined;
  return `<div class="space-y-6">
    ${hasActiveEx ? `<div onclick="go('grammar-exercise','${_ex.topicId}','${_ex.exId||''}')" class="card" style="cursor:pointer;background:#FEF3C7;border-color:#FDE68A;display:flex;align-items:center;gap:1rem" onmouseover="this.style.boxShadow='0 4px 12px rgba(0,0,0,.12)'" onmouseout="this.style.boxShadow=''">
      <span style="font-size:1.8rem">⚡</span>
      <div style="flex:1">
        <p style="font-weight:700;color:#92400E;font-size:.95rem">${T('grammar_open_ex')}</p>
        <p style="font-size:.82rem;color:#B45309">${GRAMMAR.find(g=>g.id===_ex.topicId)?.title||T('grammar_ex_fallback')} ${T('grammar_open_ex_hint')}</p>
      </div>
      <span style="color:#F59E0B;font-size:1.2rem">›</span>
    </div>` : ''}
    <div style="display:flex;align-items:center;gap:1rem">
      <button onclick="go('grammar')" style="background:none;border:none;color:#3B82F6;cursor:pointer;font-size:.9rem">${T('grammar_back')}</button>
      <div>
        <h1 style="font-size:1.6rem;font-weight:800;color:#1E293B">${T('grammar_wortarten_title')}</h1>
        <p style="font-size:.85rem;color:#64748B">${T('grammar_wortarten_full_sub')}</p>
      </div>
    </div>
    <div style="display:flex;gap:.75rem;flex-wrap:wrap;align-items:center;padding:.6rem 0;margin-bottom:.25rem">
      <button onclick="startWAQuiz()" class="btn-primary" style="font-size:.88rem">${T('grammar_wortarten_start_quiz')}</button>
      <span style="font-size:.82rem;color:#64748B">${T('grammar_wortarten_quiz_desc')}</span>
    </div>
    ${sections.map(s=>`<div class="card" style="background:${s.color};border-color:${s.border};padding:1.25rem 1.5rem">
      <h2 style="font-weight:800;color:${s.accent};margin-bottom:.5rem;font-size:1rem">${s.emoji} ${s.title}</h2>
      <p style="font-size:.88rem;color:#374151;margin-bottom:.85rem;line-height:1.6">${s.intro}</p>
      <table style="width:100%;border-collapse:collapse;font-size:.85rem;margin-bottom:.85rem">

function initGrammarLang(){
  const useLang=(P.lang||'en2')==='de'?'de':'en';
  showLang(useLang);
}
function showLang(lang){
  document.getElementById('expl-de').style.display = lang==='de'?'block':'none';
  document.getElementById('expl-en').style.display = lang==='en'?'block':'none';
  document.getElementById('lang-de').className = lang==='de'?'btn-primary':'btn-secondary';
  document.getElementById('lang-en').className = lang==='en'?'btn-primary':'btn-secondary';
  document.getElementById('lang-de').style.cssText = 'font-size:.8rem;padding:.4rem .9rem';
  document.getElementById('lang-en').style.cssText = 'font-size:.8rem;padding:.4rem .9rem';
}
function colorSentence(s, topicId){
  s = s.replace(/(don't|doesn't|didn't|can't|won't|isn't|aren't|wasn't|weren't|n't)/gi,
    '<span style="color:#EF4444;font-weight:700">$1</span>');
  s = s.replace(/\b(did|does|do|was|were|is|are|am|will|can|could|would|should|shall|must|have|has|had)\b/g,
    w => '<span style="color:#F97316;font-weight:700">'+w+'</span>');
  s = s.replace(/\b(What|Where|When|Who|How|Why|Which)\b/g,
    '<span style="color:#8B5CF6;font-weight:700">$1</span>');
  s = s.replace(/\b(I|You|We|They|He|She|It|you|we|they|he|she|it)\b/g,
    '<span style="color:#3B82F6;font-weight:700">$1</span>');
  if(topicId==='past'){
    s = s.replace(/(\w+)(ied)\b/g,
      '<span style="color:#10B981;font-weight:700">$1</span><span style="color:#F59E0B;font-weight:700">ied</span>');
    s = s.replace(/(\w{3,})(ed)\b/g,
      '<span style="color:#10B981;font-weight:700">$1</span><span style="color:#F59E0B;font-weight:700">ed</span>');
  }
  if(topicId==='pp'){
    s = s.replace(/(\w+)(-ing)\b/g,
      '<span style="color:#10B981;font-weight:700">$1</span><span style="color:#F59E0B;font-weight:700">$2</span>');
  }
  s = s.replace(/\b(play|plays|played|go|goes|went|have|has|had|read|reads|like|likes|speak|speaks|eat|eats|ate|drink|drinks|drank|watch|watches|watched|live|lives|lived|know|knew|think|thought|feel|felt|brush|brushes|listen|listens|clean|cleans|cleaned|swim|swam|write|wrote|run|ran|come|came|see|saw|make|made|get|got|take|took|give|gave|say|said|find|found|buy|bought|bring|brought|meet|met|sit|sat|sleep|slept|visit|visited|arrive|arrived|start|started|finish|finished|help|helped|move|moved|study|studied|collect|collected|train|trained)\b/g,
    '<span style="color:#10B981;font-weight:700">$1</span>');
  s = s.replace(/(yesterday|last night|last week|last summer|right now|at the moment|now|tomorrow|every day|every week|always|usually|often|sometimes|never)/gi,
    '<span style="color:#0891B2;font-size:.9em">$1</span>');
  return s;
}
function colorExpl(s){
  s = s.replace(/(don't|doesn't|didn't|can't|won't|isn't|aren't|wasn't|weren't|n't)/gi,
    '<span style="color:#EF4444;font-weight:700">$1</span>');
  s = s.replace(/\b(What|Where|When|Who|How|Why|Which)\b/g,
    '<span style="color:#8B5CF6;font-weight:700">$1</span>');
  s = s.replace(/\b(not)\b/g, '<span style="color:#EF4444;font-weight:700">not</span>');
  s = s.replace(/\b(do\/does|did|do|does|am\/is\/are|am|is|are|was\/were|was|were|will|have|has|had|can|could|would|should|shall|must)\b/g,
    w => '<span style="color:#F97316;font-weight:700">'+w+'</span>');
  s = s.replace(/(\w+)(ied)\b/g,
    '<span style="color:#10B981;font-weight:700">$1</span><span style="color:#F59E0B;font-weight:700">ied</span>');
  s = s.replace(/(\w{3,})(ed)\b/g,
    '<span style="color:#10B981;font-weight:700">$1</span><span style="color:#F59E0B;font-weight:700">ed</span>');
  s = s.replace(/(\w+)(-ing)\b/g,
    '<span style="color:#10B981;font-weight:700">$1</span><span style="color:#F59E0B;font-weight:700">$2</span>');
  s = s.replace(/going to/g, '<span style="color:#8B5CF6;font-weight:700">going to</span>');
  s = s.replace(/(Subject|Verb|Object|Subjekt|Objekt)\b/g,
    '<span style="background:#DBEAFE;color:#1E40AF;border-radius:3px;padding:0 3px;font-weight:700;font-size:.88em">$1</span>');
  s = s.replace(/\b(I|You|We|They|He|She|It|he\/she\/it|I\/you\/we\/they)\b/g,
    '<span style="color:#3B82F6;font-weight:700">$1</span>');
  s = s.replace(/(yesterday|last week|last night|last summer|ago|tomorrow|next week|soon|always|usually|often|sometimes|never)/gi,
    '<span style="color:#0891B2;font-weight:600">$1</span>');
  return s;
}

let _ex = {};
let _exStartTime = 0;
let _gPick = {}; // exercise state

function rerollGrammar(topicId,typeKey){
  const pool=GRAMMAR_POOL[topicId]||[];
  const tf=typeKey==='mc'?'mc':typeKey==='fill'?'fg':'wo';
  const sub=pool.filter(e=>e.type===tf);
  if(!sub.length)return;
  const cur=_gPick[topicId]&&_gPick[topicId][typeKey];
  let pick;
  do{pick=sub[Math.floor(Math.random()*sub.length)];}while(pick.id===cur&&sub.length>1);
  if(!_gPick[topicId])_gPick[topicId]={};
  _gPick[topicId][typeKey]=pick.id;
  go('grammar-topic',topicId,'exercises');
}

function renderExercisePage(topicId, exId){
  const t=GRAMMAR.find(g=>g.id===topicId);
  if(!t)return '';
  const pool=GRAMMAR_POOL[topicId]||[];
  const ex=pool.find(e=>e.id===exId);
  if(!ex)return '';
  let items;
  if(ex.type==='mc'){items=(ex.questions||[]).map(q=>({...q,ans:q.opts[q.correct]}));}
  else if(ex.type==='fg'){items=(ex.sentences||[]).map(s=>({...s,text:s.pre+' ___ '+s.suf,answer:s.ans}));}
  else if(ex.type==='wo'){items=(ex.items||[]).map(i=>({...i,answer:i.correct||i.answer,words:i.words||(i.correct||i.answer||'').split(' ')}));}
  else{items=ex.items||ex.sentences||ex.questions||[];}
  _ex={topicId,exId,type:ex.type,items,state:'active',answers:[],score:0,idx:0,chosen:[]};
  _exStartTime = Date.now();
  // Check for active grammar exercise
  const hasActiveEx = _ex && _ex.topicId && _ex.state !== 'done' && _ex.state !== undefined;
  return `<div class="space-y-6">
    ${hasActiveEx ? `<div onclick="go('grammar-exercise','${_ex.topicId}','${_ex.exId||''}')" class="card" style="cursor:pointer;background:#FEF3C7;border-color:#FDE68A;display:flex;align-items:center;gap:1rem" onmouseover="this.style.boxShadow='0 4px 12px rgba(0,0,0,.12)'" onmouseout="this.style.boxShadow=''">
      <span style="font-size:1.8rem">⚡</span>
      <div style="flex:1">
        <p style="font-weight:700;color:#92400E;font-size:.95rem">${T('grammar_open_ex')}</p>
        <p style="font-size:.82rem;color:#B45309">${GRAMMAR.find(g=>g.id===_ex.topicId)?.title||T('grammar_ex_fallback')} ${T('grammar_open_ex_hint')}</p>
      </div>
      <span style="color:#F59E0B;font-size:1.2rem">›</span>
    </div>` : ''}
    <div style="display:flex;align-items:center;gap:1rem">
      <button onclick="go('grammar-topic','${topicId}','exercises')" style="background:none;border:none;color:#3B82F6;cursor:pointer;font-size:.9rem">← ${t.title}</button>
      <span style="font-weight:700;color:#1E293B">${ex.title}</span>

function renderExerciseArea(){

// Multiple Choice

// WO chip normalization
const WO_PROPER=new Set(['Anna','Tim','Tom','Emma','Max','Sophie','Lucy','Ben','Liam','Mia','Lisa','Sara','Mike','Jake','Amy','London','Paris','Berlin','Munich','Hamburg','Rome','Madrid','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday','January','February','March','April','May','June','July','August','September','October','November','December','English','German','French','Spanish','Italian']);
function normalizeWOChip(w){const s=w.replace(/[.!?,;:]+$/,'');if(s==='I'||WO_PROPER.has(s))return s;return s.charAt(0).toLowerCase()+s.slice(1);}

// Word Order
function renderWO(){
  const items = _ex.items;
  const i = _ex.idx;
  const item = items[i];
  const rawWords=item.phrases||item.words||item.answer.split(' ');
  const words=rawWords.map(normalizeWOChip);
  const shuffled=[...words].sort(()=>Math.random()-.5);
  _ex.woChosen=[];
  _ex.woShuffled=shuffled;
  _ex.woWords=words;
  _ex.woCorrect=item.correct||item.answer;

  const isQuestion = (item.correct||item.answer||'').trim().endsWith('?');
  return `<div class="card space-y-5">
    <div style="display:flex;justify-content:space-between">
      <p style="font-weight:700;color:#1E293B">${isQuestion ? T('wo_question') : T('wo_prompt')}</p>
      <span style="font-size:.8rem;color:#94A3B8">${i+1}/${items.length}</span>
    </div>
    ${item.hint?`<button onclick="toggleWOHint()" id="wo-hint-btn" style="background:none;border:none;cursor:pointer;font-size:.82rem;color:#64748B;opacity:.6;padding:.1rem .3rem">💡 ${T('wo_hint')}</button><div id="wo-hint-box" style="display:none;font-size:.85rem;color:#64748B;font-style:italic;margin-top:.25rem;padding:.3rem .6rem;background:#F1F5F9;border-radius:.4rem">${item.hint}</div>`:''}
    <div class="drop-zone" id="wo-drop">
      <span style="color:#CBD5E1;font-size:.85rem" id="wo-placeholder">${T('ex_wo_placeholder')}</span>
    </div>
    <div id="wo-chips">
      ${shuffled.map((w,wi)=>`<span class="word-chip" id="wchip-${wi}" onclick="pickWO(${wi},'${escQ(w)}')">${w}</span>`).join('')}
    </div>
    <div style="display:flex;gap:.75rem">
      <button class="btn-primary" onclick="checkWO()">${T('wo_check')}</button>
      <button class="btn-secondary" onclick="clearWO()">${T('wo_reset')}</button>
    </div>
    <div id="wo-feedback"></div>
  </div>`;
}

function pickWO(wi, word){
  const chip = document.getElementById('wchip-'+wi);
  if(chip.classList.contains('chosen')) return;
  chip.classList.add('chosen');
  _ex.woChosen.push({wi, word});
  const drop = document.getElementById('wo-drop');
  const ph = document.getElementById('wo-placeholder');
  if(ph) ph.style.display='none';
  drop.innerHTML = _ex.woChosen.map((c,ci)=>`<span class="word-chip chosen" onclick="removeWO(${ci})">${c.word}</span>`).join('') + '<span id="wo-placeholder" style="display:none"></span>';
}

function removeWO(ci){
  const item = _ex.woChosen[ci];
  _ex.woChosen.splice(ci,1);
  const chip = document.getElementById('wchip-'+item.wi);
  if(chip) chip.classList.remove('chosen');
  const drop = document.getElementById('wo-drop');
  if(_ex.woChosen.length===0){
    drop.innerHTML = '<span style="color:#CBD5E1;font-size:.85rem" id="wo-placeholder">'+T('ex_wo_placeholder')+'</span>';
  } else {
    drop.innerHTML = _ex.woChosen.map((c,ci2)=>`<span class="word-chip chosen" onclick="removeWO(${ci2})">${c.word}</span>`).join('');
  }
}

function clearWO(){
  _ex.woChosen = [];
  document.querySelectorAll('.word-chip').forEach(c=>c.classList.remove('chosen'));
  document.getElementById('wo-drop').innerHTML = '<span style="color:#CBD5E1;font-size:.85rem">'+T('ex_wo_placeholder')+'</span>';
  document.getElementById('wo-feedback').innerHTML = '';
}

function checkWO(){
  const answer=_ex.woChosen.map(c=>c.word).join(' ');
  const item=_ex.items[_ex.idx];
  const correct=_ex.woCorrect||item.answer;
  const normWO=s=>s.toLowerCase().replace(/[.!?,;:]+/g,'').replace(/\s+/g,' ').trim();
  const nA=normWO(answer), nC=normWO(correct);
  let isRight=nA===nC;
  // Also accept: frequency adverb moved to sentence front
  const FREQ_ADVS = ['sometimes','always','never','usually','often','rarely','seldom','occasionally','normally'];
  if(!isRight && item.phrases && item.phrases.length>=3){
    const phN=item.phrases.map(p=>normWO(p));
    if(FREQ_ADVS.includes(phN[1])){
      const freqAdv=phN[1];
      const restParts=[phN[0],...phN.slice(2)];
      const altAnswer=freqAdv+' '+restParts.join(' ');
      if(nA===altAnswer) isRight=true;
    }
  }
  // Also accept: trailing adverbial phrase moved to front (or front phrase moved to end)
  if(!isRight && item.phrases && item.phrases.length>=2){
    const nPh=item.phrases.map(p=>normWO(p));
    const last=nPh[nPh.length-1];
    const first=nPh[0];
    if(nC.endsWith(' '+last)||nC===last){
      const base=nC.endsWith(' '+last)?nC.slice(0,nC.length-last.length-1):nC.slice(last.length);
      if(nA===last+' '+base.trim()) isRight=true;
    }
    if(!isRight&&(nC.startsWith(first+' ')||nC===first)){
      const base=nC.startsWith(first+' ')?nC.slice(first.length+1):nC.slice(first.length);
      if(nA===base.trim()+' '+first) isRight=true;
    }
  }
  if(isRight) _ex.score++;
  _ex.answers.push({answer, correct, right:isRight});
    const woItem = _ex.items[_ex.idx];
  const woExp = woItem && (woItem.exp || woItem.hint) ? (woItem.exp || woItem.hint) : '';
  const woExpReveal = woExp
    ? `<span onclick="this.style.display='none';this.nextElementSibling.style.display='block'" style="font-size:.78rem;color:#059669;cursor:pointer;text-decoration:underline;font-weight:600;display:block;margin-top:.4rem">${T('ex_why')}</span><span style="display:none;font-size:.85rem;color:#065F46;margin-top:.35rem">💡 ${woExp}</span>`
    : '';
  document.getElementById('wo-feedback').innerHTML = isRight
    ? `<div class="feedback-ok">${T('feedback_ok')}${woExpReveal}</div><button class="btn-primary" style="margin-top:.75rem" onclick="nextWO()">${_ex.idx+1<_ex.items.length?T('btn_next'):T('ex_show_result')}</button>`
    : `<div class="feedback-err">${T('ex_correct_would_be')} <strong>${correct}</strong>${woExp?`<br><span style="font-size:.85rem;color:#7F1D1D;margin-top:.3rem;display:block">💡 ${woExp}</span>`:''}</div><button class="btn-primary" style="margin-top:.75rem" onclick="nextWO()">${_ex.idx+1<_ex.items.length?T('btn_next'):T('ex_show_result')}</button>`;
}

function nextWO(){
  _ex.idx++;
  if(_ex.idx >= _ex.items.length) { _ex.state='done'; }
  document.getElementById('ex-area').innerHTML = renderExerciseArea();
}

// Done screen
function renderExDone(){
  const {topicId,exId,type,items,score}=_ex;
  const t=GRAMMAR.find(g=>g.id===topicId);
  const pool=GRAMMAR_POOL[topicId]||[];
  const curEx=pool.find(e=>e.id===exId);
  const curDiff=(curEx&&curEx.diff)||1;
  let pct=(type==='fill'||type==='fg')?score:Math.round((score/Math.max(1,items.length))*100);
  const passed=pct>=60;
  const timeTaken=Date.now()-(_exStartTime||Date.now());
  // Save to history
  if(!P.gHistory)P.gHistory={};
  if(!P.gHistory[topicId])P.gHistory[topicId]=[];
  P.gHistory[topicId].push({exId,diff:curDiff,pct,time:timeTaken,title:curEx?curEx.title:'',ts:Date.now()});
  // Legacy done flags
  if(!P.grammar[topicId])P.grammar[topicId]={mcDone:false,fillDone:false,woDone:false,completed:false};
  const tk=type==='mc'?'mcDone':type==='fg'?'fillDone':'woDone';
  P.grammar[topicId][tk]=true;
  const allDone=P.grammar[topicId].mcDone&&P.grammar[topicId].fillDone&&P.grammar[topicId].woDone;
  if(allDone){P.grammar[topicId].completed=true;P.grammar[topicId].score=pct;}
  // Error tracker
  if(type!=='fg'&&type!=='fill'){
    const _wrong=items.length-score;
    if(_wrong>0){if(!P.errors)P.errors={};const _ek='grammar:'+topicId;P.errors[_ek]=(P.errors[_ek]||0)+_wrong;}

      ${upPick?`<button class="btn-primary" style="background:#10B981" onclick="go('grammar-exercise','${topicId}','${upPick.id}')">${T('ex_result_higher')} ${'⭐'.repeat(curDiff+1)} →</button>`:''}

      <button class="btn-secondary" onclick="endGrammarExercise('${topicId}')">${T('ex_finish_back')}</button>
    </div>
  </div>`;
}

// ── RANDOM VOCAB TEST ──
let _rvt = {items:[], idx:0, score:0, flipped:false, done:false};

function buildVocabTestItems(n){
  n = n || 20;
  const all = [];
  VOCAB.forEach(t=>{ t.words.forEach(w=>{ all.push({word:w, topic:t.title}); }); });
  // shuffle
  for(let i=all.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [all[i],all[j]]=[all[j],all[i]]; }
  return all.slice(0, Math.min(n, all.length)).map(item=>{
    const isDE = Math.random() < 0.5;
    return { word:item.word, topic:item.topic, isDE, prompt:isDE?item.word.de:item.word.en, correct:isDE?item.word.en:item.word.de };
  });
}

function startVocabTest(n){
  _rvt = {items:buildVocabTestItems(n), idx:0, score:0, flipped:false, done:false};
  go('vocab-test');
}

function rvtFlip(){
  _rvt.flipped = !_rvt.flipped;
  go('vocab-test');
}

function rvtAnswer(correct){
  if(correct){
    _rvt.score++;
  } else {
    // Mit Zurücklegen: falsche Karte ans Ende der Warteschlange
    _rvt.items.push(_rvt.items[_rvt.idx]);
  }
  _rvt.idx++;
  _rvt.flipped = false;
  if(_rvt.idx>=_rvt.items.length) _rvt.done=true;
  go('vocab-test');
}

let _vFilter = 'all';
function setVFilter(f){ _vFilter=f; document.getElementById('app').innerHTML=render(_state); }
function vFilterMatch(t, f){
  if(f==='all') return true;
  if(f==='soul5') return t.cat==='soul5' || (t.cat==='basics' && (t.cls===5||t.cls===0));
  if(f==='soul6') return t.cat==='soul6' || (t.cat==='basics' && (t.cls===6||t.cls===0));
  if(f==='basics') return t.cat==='basics';
  return true;
}
function vocabTitle(t){
  // Localize "Baustein N – Rest" → "Module N – Rest" (EN) / "Baustein N – Rest" (DE)
  const m = (t.title||'').match(/^Baustein\s+(\d+)\s*[–-]\s*(.*)$/);
  if(m){
    const prefix = (P.lang||'en2')==='de' ? 'Baustein' : 'Module';
    return prefix + ' ' + m[1] + ' – ' + m[2];
  }
  return t.title;
}

  </tr>`).join('');

  const ov = document.createElement('div');

function renderVocabTopic(id, mode){
  const t = VOCAB.find(v=>v.id===id);
  if(!t) return `<p>${T('error_not_found')}</p>`;
  mode = mode||'list';
  const vp = P.vocab[id]||{known:[]};
  const known = new Set(vp.known||[]);

  const tabBtn = (m, label) => `<button onclick="startVocabMode('${id}','${m}')" style="padding:.5rem 1rem;border-radius:.75rem;font-size:.85rem;font-weight:600;cursor:pointer;border:none;background:${mode===m?'#3B82F6':'#F1F5F9'};color:${mode===m?'#fff':'#64748B'};transition:all .15s">${label}</button>`;
  const tabBtn2 = (m, label) => tabBtn(m, label);

  let content = '';
  if(mode==='list') content = renderVocabList2(t, known, id);
  else if(mode==='flashcard') content = renderFlashcard(t, id);
  else if(mode==='quiz') content = renderVocabQuiz(t, id);
  else if(mode==='type') content = renderVocabType(t, id);

  return `<div class="space-y-5">
    <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
      <button onclick="go('vocabulary')" style="background:none;border:none;color:#3B82F6;cursor:pointer;font-size:.9rem">${T('irreg_back')}</button>
      <div>
        <h1 style="font-size:1.6rem;font-weight:800;color:#1E293B">${t.emoji} ${t.title}</h1>
        <p style="color:#64748B;font-size:.85rem">${t.words.length} ${T('label_words')}</p>
      </div>
    </div>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap">
      ${tabBtn('list',T('vocab_tab_list'))}
      ${tabBtn('flashcard',T('vocab_tab_fc'))}
      ${tabBtn('quiz','🧪 Quiz')}
      ${tabBtn('type',T('vocab_tab_write'))}
      <button onclick="printVocab('${id}')" style="padding:.5rem 1rem;border-radius:.75rem;font-size:.85rem;font-weight:600;cursor:pointer;border:none;background:#F1F5F9;color:#475569;margin-left:auto">🖨️ ${T('vocab_print')||'Drucken'}</button>
    </div>
    ${content}
    <div style="border-top:1px solid #F1F5F9;padding-top:1rem;margin-top:.5rem;display:flex;gap:.5rem;align-items:center;flex-wrap:wrap">
      <span style="font-size:.75rem;color:#94A3B8;font-weight:600">${T('vocab_games')}</span>
      ${t.words.length>=4?`<button onclick="go('vocab-memory','${id}')" style="padding:.35rem .75rem;border-radius:.625rem;font-size:.8rem;font-weight:600;cursor:pointer;border:none;background:#EFF6FF;color:#1D4ED8">🃏 Memory</button>`:''}
      <button onclick="go('grammar-quickfire','mixed')" style="padding:.35rem .75rem;border-radius:.625rem;font-size:.8rem;font-weight:600;cursor:pointer;border:none;background:#FDF4FF;color:#6B21A8">⚡ Quick-Fire</button>
      <button onclick="go('spiele')" style="padding:.35rem .75rem;border-radius:.625rem;font-size:.8rem;font-weight:600;cursor:pointer;border:none;background:#F1F5F9;color:#475569">${T('vocab_all_games')}</button>
    </div>
  </div>`;
}


// ── Web Speech API ──
function speak(text, lang){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang || 'en-GB';
  u.rate = 0.88;
  window.speechSynthesis.speak(u);
}
function speakBtn(text, lang){
  const l = lang || 'en-GB';
  return `<button onclick="event.stopPropagation();speak('${text}','${l}')" title="Aussprache" style="background:none;border:none;cursor:pointer;font-size:.95rem;padding:.1rem .25rem;color:#CBD5E1;line-height:1" onmouseover="this.style.color='#3B82F6'" onmouseout="this.style.color='#CBD5E1'">🔊</button>`;
}

function startVocabMode(id, mode){
  if(mode==='flashcard'){
    // Force reshuffle: reset _fc so renderFlashcard sees a new topic and reshuffles
    _fc = {id:'', idx:0, flipped:false, direction:(_fc&&_fc.direction)||'en-de', words:[]};

function normalizeVocab(s){
  return s.toLowerCase()
    .replace(/^to\s+/,'')
    .replace(/^(der|die|das|the|a|an)\s+/i,'')
    .replace(/[.,!?;:]/g,'')
    .replace(/[-–]/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}

// Levenshtein distance for small typo tolerance
function vocabEditDistance(a, b){
  const m=a.length, n=b.length;
  if(Math.abs(m-n) > 2) return 99; // shortcut: too different
  const dp = Array.from({length:m+1}, (_,i)=>[i, ...Array(n).fill(0)]);
  for(let j=0;j<=n;j++) dp[0][j]=j;
  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      const cost = a[i-1]===b[j-1] ? 0 : 1;
      dp[i][j] = Math.min(dp[i-1][j]+1, dp[i][j-1]+1, dp[i-1][j-1]+cost);
    }
  }
  return dp[m][n];
}
// How many typos to allow based on word length
function vocabAllowedTypos(answer){
  const len = answer.replace(/\s/g,'').length;
  if(len <= 4) return 0;   // short words: must be exact
  if(len <= 8) return 1;   // medium: 1 typo
  return 2;                // long words/phrases: 2 typos
}

function checkVocabType(id, correct){
  const inp = document.getElementById('vtype-input');
  const val = inp ? inp.value.trim() : '';
  _vtState[id].val = val;
  const normVal = normalizeVocab(val);
  // find the current word to check alts
  const qs = _vtState[id];
  const t = VOCAB.find(v=>v.id===id);
  const w = qs.words[qs.idx] || (t ? t.words[qs.idx] : null);
  const alts = (w && w.alts) ? w.alts : [];
  // build list of accepted answers: correct + alts
  const accepted = [correct, ...alts].map(a=>normalizeVocab(a));
  // fuzzy: val is contained in correct (for multi-word answers where student types partial)
  const fuzzyOk = accepted.some(a => a.includes(normVal) && normVal.length > 2);
  const exactOk = accepted.some(a => a === normVal);
  // typo tolerance: accept small edit distance, scaled to word length
  let typoOk = false;
  if(!exactOk && !fuzzyOk && normVal.length > 0){
    typoOk = accepted.some(a => vocabEditDistance(a, normVal) <= vocabAllowedTypos(a));
  }
  const isRight = exactOk || fuzzyOk || typoOk;
  _vtState[id].checked = true;
  _vtState[id].lastRight = isRight;
  _vtState[id].lastTypo = (typoOk && !exactOk && !fuzzyOk);
  if(isRight) _vtState[id].score++;
  go('vocab-topic', id, 'type');
}

function nextVocabType(id){

}

function toggleIrregFC(origIdx){
  if(!P.irreg) P.irreg = [];
  const pos = P.irreg.indexOf(origIdx);
  if(pos>=0) P.irreg.splice(pos,1); else P.irreg.push(origIdx);
  checkBadges(); save();
  go('irreg','flashcard');
}

function toggleIrreg(idx){
  if(!P.irreg) P.irreg = [];
  const pos = P.irreg.indexOf(idx);
  if(pos>=0) P.irreg.splice(pos,1); else P.irreg.push(idx);
  checkBadges();
  save();
  const known = new Set(P.irreg);
  const isKnown = known.has(idx);
  const row = document.querySelectorAll('[onclick^="toggleIrreg"]')[idx];
  if(row){
    row.style.background = isKnown?'#FFFBEB':'#F8FAFC';
    row.style.borderColor = isKnown?'#FDE68A':'#F1F5F9';
    row.querySelector('span').textContent = isKnown?'✅':'⭕';
  }
}

function pickIrMC(oi, chosen, correct){

  if(!isRight) document.querySelectorAll('#irmc-opts .opt-btn').forEach(b=>{ if(b.textContent.trim()===correct) b.className='opt-btn opt-correct'; });
  if(isRight) _irMC.score++;
  _irMC.answers.push({right:isRight});
  const fb = document.getElementById('irmc-fb');
  fb.innerHTML = (isRight?`<div class="feedback-ok">${T('feedback_ok')}</div>`:`<div class="feedback-err">${T('feedback_wrong')} <strong>${correct}</strong></div>`)

let _rState = {id:'', phase:'vocab', answers:[], checked:false};
function renderReadingTask(id){
  const t = READING.find(r=>r.id===id);
  if(!t) return `<p>${T('error_not_found')}</p>`;
  if(_rState.id!==id){ _rState = {id, phase:'vocab', answers:[], checked:false}; }
  if(_rState.phase==='vocab') return renderReadingVocab(t);
  if(_rState.phase==='pre') return renderReadingPre(t);
  if(_rState.phase==='while') return renderReadingWhile(t);
  if(_rState.phase==='post') return renderReadingPost(t);
  if(_rState.phase==='done') return renderReadingDone(t);
  return '';
}

function _rStepBar(active){
  const steps=[T('reading_step_vocab'),T('reading_step_pre'),T('reading_step_while'),T('reading_step_post')];

  return `<div style="display:flex;gap:.3rem;margin-bottom:.2rem">
    ${steps.map((_,i)=>`<div style="flex:1;height:.3rem;border-radius:99px;background:${i<n?'#10B981':i===n?'#3B82F6':'#E2E8F0'}"></div>`).join('')}

// Schritt 2 – While-Reading (Text + Aufgaben, gist → detail)
function renderReadingWhile(t){
  const isChecked = _rState.checked;
  const gistQs   = t.questions.map((q,i)=>({...q,origIdx:i})).filter(q=>q.gist);
  const detailQs  = t.questions.map((q,i)=>({...q,origIdx:i})).filter(q=>!q.gist);

  const renderQ = (q, num) => {
    const ans = _rState.answers[q.origIdx];
    return `<div>
      <p style="font-weight:600;color:#1E293B;margin-bottom:.4rem">${num}. ${q.q}</p>
      ${q.type==='mc'
        ? q.opts.map(o=>{
            let cls='opt-btn';
            if(isChecked){ if(o===q.ans) cls+=' opt-correct'; else if(o===ans) cls+=' opt-wrong'; }
            else if(o===ans) cls+=' opt-selected';
            return `<button class="${cls}" ${isChecked?'disabled':''} onclick="pickRQ(${q.origIdx},'${escQ(o)}')">${o}</button>`;
          }).join('')
        : ['true','false'].map(val=>{
            let cls='opt-btn';
            if(isChecked){ if(val===q.ans) cls+=' opt-correct'; else if(val===ans) cls+=' opt-wrong'; }
            else if(val===ans) cls+=' opt-selected';
            return `<button class="${cls}" style="display:inline-block;width:48%;margin-right:1%" ${isChecked?'disabled':''} onclick="pickRQ(${q.origIdx},'${val}')">${val==='true'?'True ✓':'False ✗'}</button>`;
          }).join('')
      }
      ${isChecked&&q.exp?`<p style="font-size:.78rem;color:#64748B;margin-top:.2rem;font-style:italic">${q.exp}</p>`:''}
    </div>`;
  };

  let num=0;
  const gistSection = gistQs.length>0 ? `
    <div>
      <p style="font-size:.73rem;font-weight:700;color:#7C3AED;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem">${T('reading_gist_label')}</p>
      <div class="space-y-4">${gistQs.map(q=>renderQ(q,++num)).join('')}</div>
    </div>` : '';

  const detailSection = `
    <div>
      ${gistQs.length>0?`<p style="font-size:.73rem;font-weight:700;color:#0369A1;text-transform:uppercase;letter-spacing:.06em;margin:.75rem 0 .5rem">${T('reading_detail_label')}</p>`:''}
      <div class="space-y-4">${detailQs.map(q=>renderQ(q,++num)).join('')}</div>
    </div>`;

  const correct = t.questions.filter((q,i)=>_rState.answers[i]===q.ans).length;
  return `<div class="space-y-5">
    <div style="display:flex;gap:1rem;align-items:center;flex-wrap:wrap">
      <button onclick="_rState.phase='pre';go('reading-task','${t.id}')" style="background:none;border:none;color:#3B82F6;cursor:pointer">← ${T('reading_step_pre')}</button>
      <h1 style="font-size:1.4rem;font-weight:800;color:#1E293B">${T('reading_while_prefix')} ${t.title}</h1>
    </div>
    ${_rStepBar('while')}
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;align-items:start">
      <div class="card" style="background:#FFFBEB;border-color:#FDE68A;max-height:80vh;overflow-y:auto">
        <h3 style="font-weight:700;color:#92400E;margin-bottom:.75rem;font-size:.9rem">📖 ${t.title}</h3>
        <div style="font-size:.88rem;color:#44403C;line-height:1.85;white-space:pre-line">${t.text}</div>
      </div>
      <div class="card space-y-4">
        ${gistSection}
        ${detailSection}
        ${!isChecked
          ? `<div id="reading-err" style="color:#EF4444;font-size:.83rem;font-weight:600;min-height:1.1rem"></div>
             <button class="btn-primary" onclick="checkReading('${t.id}')">${T('reading_check')}</button>`
          : `<div class="${correct===t.questions.length?'feedback-ok':'feedback-info'}" style="margin-top:.25rem">${correct}/${t.questions.length} ${T('ex_correct_score')} ✓</div>
             <button class="btn-primary" style="margin-top:.5rem" onclick="_rState.phase='post';go('reading-task','${t.id}')">${T('reading_next_post')}</button>`
        }
      </div>
    </div>
  </div>`;
}

function renderReadingPost(t){

  return `<div class="space-y-5">
    <div style="display:flex;gap:1rem;align-items:center">
      <button onclick="_rState.phase='while';go('reading-task','${t.id}')" style="background:none;border:none;color:#3B82F6;cursor:pointer">← ${T('reading_step_while')}</button>
      <h1 style="font-size:1.4rem;font-weight:800;color:#1E293B">${T('reading_step_post')}</h1>
    </div>
    ${_rStepBar('post')}
    <div class="card" style="background:#ECFDF5;border-color:#6EE7B7">
      <div class="${correct===t.questions.length?'feedback-ok':'feedback-info'}" style="margin-bottom:.75rem">
        ${correct}/${t.questions.length} ${T('ex_correct_score')}
      </div>
      <h2 style="font-weight:700;color:#065F46;margin-bottom:.8rem">${T('reading_post_heading')}</h2>
      ${taskCards}
    </div>
    <button class="btn-primary" onclick="finishReading('${t.id}')">${T('reading_finish')}</button>
  </div>`;
}

function pickRQ(qi, val){
  const sy = window.scrollY;
  _rState.answers[qi] = val;
  _rState.phase = 'while';
  go('reading-task', _rState.id);
  setTimeout(()=>window.scrollTo(0,sy),0);
}

function checkReading(id){
  const t = READING.find(r=>r.id===id);
  const unanswered = t.questions.reduce((n,q,i)=>n+(_rState.answers[i]===undefined?1:0),0);
  if(unanswered>0){
    const el=document.getElementById('reading-err');
    if(el) el.textContent=T('reading_unanswered_pre')+unanswered+T('reading_unanswered_post');
    return;
  }
  _rState.checked=true;
  _rState.phase='while';
  go('reading-task',id);
}

function finishReading(id){
  if(!P.reading.includes(id)) P.reading.push(id);
  const _rt = READING.find(r=>r.id===id);
  if(_rt && _rt.questions.length){
    const correct = _rt.questions.filter((q,i)=>_rState.answers[i]===q.ans).length;
    const newPct = Math.round(correct/_rt.questions.length*100);
    if(!P.readingScores) P.readingScores = {};
    if(!P.readingScores[id] || newPct > P.readingScores[id]) P.readingScores[id] = newPct;
  }
  addXP(20); checkBadges(); save();
  _rState.phase='done';
  go('reading-task',id);
}

function renderReadingDone(t){
  const correct = t.questions.filter((q,i)=>_rState.answers[i]===q.ans).length;
  const pct = Math.round(correct/t.questions.length*100);
  return `<div class="card" style="text-align:center;padding:2rem">
    <div style="font-size:3rem">${pct===100?'🏆':pct>=60?'👍':'💪'}</div>
    <h2 style="font-size:1.4rem;font-weight:800;color:#1E293B;margin:.5rem 0">${T('reading_done_heading')}</h2>
    <div style="font-size:2rem;font-weight:800;color:${pct===100?'#10B981':pct>=60?'#3B82F6':'#F59E0B'}">${pct}%</div>
    <p style="color:#64748B;margin:.25rem 0 1rem">${correct}/${t.questions.length} ${T('ex_correct_score')}</p>
    <div style="display:flex;gap:.75rem;justify-content:center">
      <button class="btn-secondary" onclick="_rState={id:'${t.id}',phase:'vocab',answers:[],checked:false};go('reading-task','${t.id}')">${T('btn_try_again')}</button>
      <button class="btn-primary" onclick="go('reading-list')">${T('btn_all_texts')}</button>
    </div>
  </div>`;
}

function normPhrase(s){ return (s||'').toLowerCase().replace(/[.…\s]+$/,'').replace(/\s+/g,' ').trim(); }
function writingStartersPhrases(t){
  const rawStarters = (t.starters||[]).slice();
  const rawPhrases = (t.phrases||[]).slice();
  // Starters: keep as the sentence-opener column.
  const starterKeys = new Set(rawStarters.map(normPhrase));
  // Phrases: drop any that match a starter (dedupe), keep the rest as multi-word expressions.
  const phrases = rawPhrases.filter(p=>!starterKeys.has(normPhrase(p)));
  return {starters: rawStarters, phrases};
}

function updateWP(val){
  _wpState.text = val;
  const minW = _wpState.prompt ? _wpState.prompt.minWords : 50;
  const words = val.trim().split(/\s+/).filter(Boolean).length;
  const spans = document.querySelectorAll('span');
  const wLabel = T('label_words');
  spans.forEach(s=>{ if(s.textContent.match(/\d+\/\d+/)) { s.textContent = words+'/'+minW+' '+wLabel; s.style.color=words>=minW?'#10B981':'#94A3B8'; } });
}

function saveWPText(){
  const text = _wpState.text || '';
  const minW = _wpState.prompt ? _wpState.prompt.minWords : 50;
  const words = text.trim().split(/\s+/).filter(Boolean).length;
  const checks = [];
  if(words < minW) checks.push(T('writing_too_few_words')+' (min. '+minW+')');
  const iLower = (text.match(/\bi\b/g)||[]).length;
  if(iLower > 0) checks.push(T('writing_capital_i'));
  if(!/[.!?]\s*$/.test(text.trim())) checks.push(T('writing_no_punct'));
  const fb = document.getElementById('wp-feedback');
  if(checks.length > 0 && fb){
    fb.innerHTML = '<div class="feedback-err"><strong>'+T('writing_check_now')+'</strong> '+checks.join(' · ')+'</div>';
    fb.style.display='block'; return;
  }
  if(!P.writing.includes('prompt-free')) P.writing.push('prompt-free');
  addXP(30); checkBadges(); save();
  if(fb){ fb.innerHTML='<div class="feedback-ok">✓ '+T('ex_result_good')+'</div>'; fb.style.display='block'; }
}

function updateWriting(id, val){
  _wState.text = val;
  const t = WRITING.find(w=>w.id===id);
  const words = val.trim().split(/\s+/).filter(Boolean).length;
  const enough = words >= t.min;
  const counter = document.querySelector('[id="writing-area"] ~ *');
  // just re-update word count display
  const spans = document.querySelectorAll('span');
  spans.forEach(s=>{ if(s.textContent.includes('/'+t.min)){ s.textContent = words+'/'+t.min+' '+T('label_words'); s.style.color=enough?'#10B981':'#94A3B8'; } });
}

function toggleWCheck(id, ci){
  _wState.checklist[ci] = !_wState.checklist[ci];
  const sy = window.scrollY;
  go('writing-task',id);
  setTimeout(()=>{
    window.scrollTo(0, sy);
    const ta=document.getElementById('writing-area'); if(ta) ta.value=_wState.text;
  },0);
}

const WRITING_KEYWORDS = {
  w1: ['my name is', 'years old', 'i live', 'i like', 'favourite', 'weekend', 'write soon'],
  w2: ['weather', 'yesterday', 'greetings from', 'see you', 'great time'],
  w3: ['saturday', 'sunday', 'first', 'then', 'finally', 'enjoyed', 'favourite'],
  w4: ['once', 'suddenly', 'said', 'because', 'in the end']
};

function submitWritingCheck(id){
  const t = WRITING.find(w=>w.id===id);
  const words = (_wState.text||'').trim().split(/\s+/).filter(Boolean).length;
  const checkDone = _wState.checklist.filter(Boolean).length;
  const missing = [];
  if(words < (t?t.min:60)) missing.push(T('writing_min_words_pre')+words+'/'+(t?t.min:60)+T('writing_min_words_post'));
  if(checkDone < (t?wChecklist(t).length:0)) missing.push(T('writing_checklist_pre')+checkDone+'/'+(t?wChecklist(t).length:0)+T('writing_checklist_post'));
  if(missing.length > 0){
    const fb = document.getElementById('writing-feedback');
    if(fb){
      fb.style.display='block';
      fb.innerHTML = `<div class="feedback-err"><strong>${T('writing_not_done_yet')}</strong><br>${missing.map(m=>'• '+m).join('<br>')}</div>`;
    }
    return;
  }
  submitWriting(id);
}

function submitWriting(id){
  const t = WRITING.find(w=>w.id===id);
  const text = _wState.text;
  const words = text.trim().split(/\s+/).filter(Boolean).length;
  const checks = [];
  // word count
  if(words < t.min) checks.push('⚠ '+T('writing_too_few_words')+' (min. '+t.min+')');
  // I always capitalized
  const iLower = (text.match(/\bi\b/g)||[]).length;
  if(iLower > 0) checks.push('⚠ '+T('writing_capital_i'));
  // ends with punctuation
  if(!/[.!?]\s*$/.test(text.trim())) checks.push('⚠ '+T('writing_no_punct'));
  // checklist items
  const checked = (_wState.checklist||[]).filter(Boolean).length;
  const total = (wChecklist(t)||[]).length;
  if(checked < total) checks.push('⚠ '+T('writing_checklist_open_pre')+(total-checked)+T('writing_checklist_open_post'));

  // keyword check
  const kws = WRITING_KEYWORDS[id] || [];
  const textLower = text.toLowerCase();
  const kwResults = kws.map(k => ({kw: k, found: textLower.includes(k.toLowerCase())}));
  const missing = kwResults.filter(k => !k.found);

  const fb = document.getElementById('writing-feedback');
  if(fb) {
    let kwHtml = '';
    if(kwResults.length > 0){
      kwHtml = '<div style="margin-top:.5rem"><p style="font-size:.82rem;font-weight:700;color:#1E293B;margin-bottom:.4rem">'+T('writing_keywords_label')+'</p><div style="display:flex;flex-wrap:wrap;gap:.3rem">'
        + kwResults.map(k=>`<span style="font-size:.78rem;padding:.2rem .6rem;border-radius:99px;background:${k.found?'#D1FAE5':'#FEE2E2'};color:${k.found?'#065F46':'#991B1B'};font-weight:600">${k.found?'✅':'❌'} ${k.kw}</span>`).join('')
        + '</div></div>';
    }
    if(checks.length > 0){
      fb.innerHTML = '<div class="feedback-err" style="margin-bottom:.75rem"><strong>'+T('writing_please_check')+'</strong><ul style="margin:.4rem 0 0 1.2rem">'+checks.map(c=>'<li style="font-size:.85rem">'+c+'</li>').join('')+'</ul>'+kwHtml+'</div>';
      fb.style.display='block';
      return;
    } else if(missing.length > 0){
      fb.innerHTML = '<div style="background:#FFF7ED;border:1px solid #FED7AA;border-radius:.75rem;padding:.75rem;margin-bottom:.75rem">'+kwHtml+'<p style="font-size:.8rem;color:#92400E;margin-top:.4rem">'+T('writing_can_submit')+'</p></div>';
      fb.style.display='block';
    } else {
      fb.innerHTML = '<div class="feedback-ok" style="margin-bottom:.75rem">'+kwHtml+'</div>';
      fb.style.display='block';
    }
  }
  if(!P.writing.includes(id)) P.writing.push(id);
  // Save submitted text + keywords for review
  const foundKws = (WRITING_KEYWORDS[id]||[]).filter(k=>(_wState.text||'').toLowerCase().includes(k));
  _wState.keywords = foundKws;
  addXP(30); checkBadges(); save();
  go('writing-task',id);
}


function teacherSelectHTML(small){
  const opts = teacherOptions();
  const cur = (P.teacherEmail||'').trim();
  const known = opts.find(o=>o.email===cur);
  const isOther = cur && !known;
  const pad = small ? '.4rem .75rem' : '.5rem .75rem';
  const fs = small ? '.88rem' : '.9rem';
  const radius = small ? '.5rem' : '.75rem';
  let html = `<select onchange="onTeacherSelect(this.value)" style="width:100%;border:1.5px solid #E2E8F0;border-radius:${radius};padding:${pad};font-size:${fs};outline:none;box-sizing:border-box;background:#fff;cursor:pointer">`;
  html += `<option value="" ${!cur?'selected':''} disabled>${T('writing_teacher_choose')}</option>`;
  opts.forEach(o=>{
    html += `<option value="${o.email}" ${o.email===cur?'selected':''}>${o.name} (${o.email})</option>`;
  });
  html += `<option value="__other__" ${isOther?'selected':''}>${T('writing_teacher_other')}</option>`;
  html += `</select>`;
  // free-text field shown when "other" is chosen or a custom address is stored
  html += `<input type="email" id="teacher-other-input" placeholder="${T('writing_teacher_ph')}" autocomplete="email" inputmode="email"
    style="width:100%;margin-top:.4rem;border:1.5px solid #E2E8F0;border-radius:${radius};padding:${pad};font-size:${fs};outline:none;box-sizing:border-box;display:${isOther?'block':'none'}"
    oninput="setTeacherEmail(this.value)" value="${isOther?cur:''}">`;
  if(cur && (known||isOther)){
    html += `<p style="font-size:.72rem;color:#10B981;margin-top:.25rem;font-weight:600">${T('writing_teacher_saved')}</p>`;
  }
  return html;
}
function onTeacherSelect(val){
  if(val==='__other__'){
    const inp = document.getElementById('teacher-other-input');
    if(inp){ inp.style.display='block'; inp.focus(); }
    P.teacherEmail=''; save();
  } else {
    P.teacherEmail = val; save();
    const inp = document.getElementById('teacher-other-input');
    if(inp) inp.style.display='none';
  }
}
function setTeacherEmail(v){ P.teacherEmail = (v||'').trim(); save(); }

function mailFreeWriting(){
  const name = (_wpState.name||'').trim();
  const to = (P.teacherEmail||'').trim();
  const text = _wpState.text || '';
  // Friendly guard: need a name, a teacher address and some text
  const wpFb = document.getElementById('wp-feedback');
  const problems = [];
  if(!name) problems.push(T('writing_name_required'));
  if(!to) problems.push(T('writing_teacher_required'));
  if(!text.trim()) problems.push(T('writing_free_empty'));
  if(problems.length){
    if(wpFb){ wpFb.style.display='block'; wpFb.innerHTML = `<div class="feedback-err"><strong>${T('writing_not_done_yet')}</strong><br>${problems.map(m=>'• '+m).join('<br>')}</div>`; }
    return;
  }
  const prompt = _wpState.prompt;
  const promptText = prompt ? prompt.prompt : T('writing_free_heading');
  const wCount = text.trim().split(/\s+/).filter(Boolean).length;
  const subject = encodeURIComponent('[Free Writing] ' + promptText.substring(0,40) + ' – ' + name);
  const bodyText = T('writing_mail_greeting')+'\n\n' +
    T('writing_mail_student')+' ' + name + '\n' +
    T('writing_mail_prompt_label')+' ' + promptText + '\n' +
    T('writing_mail_words')+' ' + wCount + '\n\n' +
    '--- ' + T('writing_mail_text_label') + ' ---\n\n' + text;
  window._freeMailText = bodyText;
  const a = document.createElement('a');
  a.href = 'mailto:' + to + '?subject=' + subject + '&body=' + encodeURIComponent(bodyText);
  a.click();
  setTimeout(()=>{ const fb=document.getElementById('mail-fallback-free'); if(fb) fb.style.display='block'; }, 400);
}

function copyFreeWritingText(){
  const text = window._freeMailText || '';

function mailWriting(id){
  const t = WRITING.find(w=>w.id===id);
  // Same completeness check as the save button before sending
  const wordsNow = (_wState.text||'').trim().split(/\s+/).filter(Boolean).length;
  const checkDoneNow = (_wState.checklist||[]).filter(Boolean).length;
  const missingNow = [];
  if(wordsNow < (t?t.min:60)) missingNow.push(T('writing_min_words_pre')+wordsNow+'/'+(t?t.min:60)+T('writing_min_words_post'));
  if(checkDoneNow < (t?wChecklist(t).length:0)) missingNow.push(T('writing_checklist_pre')+checkDoneNow+'/'+(t?wChecklist(t).length:0)+T('writing_checklist_post'));
  if(missingNow.length > 0){
    const fb = document.getElementById('writing-feedback');
    if(fb){ fb.style.display='block'; fb.innerHTML = `<div class="feedback-err"><strong>${T('writing_not_done_yet')}</strong><br>${missingNow.map(m=>'• '+m).join('<br>')}</div>`; }
    return;
  }
  const name = (_wState.name||'').trim() || 'Unbekannt';
  const text = _wState.text || '';
  const wCount = text.trim().split(/\s+/).filter(Boolean).length;
  const subject = encodeURIComponent('[Writing] ' + (t?t.title:T('writing_task_label')) + ' – ' + name);
  const bodyText = T('writing_mail_greeting')+'\n\n' +
    T('writing_mail_student')+' ' + name + '\n' +
    T('writing_mail_task_label')+' ' + (t?t.title:'') + '\n' +
    T('writing_mail_words')+' ' + wCount + '\n\n' +
    '--- ' + T('writing_mail_text_label') + ' ---\n\n' + text;
  const body = encodeURIComponent(bodyText);
  const to = (P.teacherEmail||'').trim();
  const mailto = 'mailto:' + to + '?subject=' + subject + '&body=' + body;
  // Open mailto (works on devices with mail app configured)
  const a = document.createElement('a');
  a.href = mailto;
  a.click();
  // Show copy fallback hint after short delay
  setTimeout(()=>{
    const fb = document.getElementById('mail-fallback-' + id);
    if(fb) fb.style.display = 'block';
    // Store text for copy
    window._mailBodyText = bodyText;
  }, 400);
}

function copyMailText(){
  const text = window._mailBodyText || '';
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>{
      const btn = document.getElementById('copy-mail-btn');
      if(btn){ btn.textContent='✓ Kopiert!'; btn.style.background='#10B981'; }
    }).catch(()=>{ alert(T('writing_copy_manual')+'\n\n' + text); });
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = document.getElementById('copy-mail-btn');
    if(btn){ btn.textContent='✓ Kopiert!'; btn.style.background='#10B981'; }
  }
}

// ── WORD SEARCH ──────────────────────────────────────────────────
let _wsState = {found:[], grid:[], words:[]};

let _wsTopicId = 'mixed';
function buildWordSearch(topicId){
  _wsTopicId = topicId||'mixed';
  let wordPool;
  if(topicId==='irreg'){
    wordPool = IRREG.map(v=>({en:v.inf.replace(/^to /,''), de:v.de})).filter(w=>!/\s/.test(w.en)&&w.en.length>=3&&w.en.length<=10);
  } else if(topicId && topicId!=='mixed'){
    const t = VOCAB.find(v=>v.id===topicId);
    wordPool = t ? t.words.filter(w=>w.en&&!/\s/.test(w.en.replace(/^to /,''))&&w.en.replace(/^to /,'').length>=3&&w.en.replace(/^to /,'').length<=10) : [];
  }
  if(!wordPool||wordPool.length<5){
    wordPool = VOCAB.flatMap(t=>t.words).filter(w=>w.en&&!/\s/.test(w.en.replace(/^to /,''))&&w.en.replace(/^to /,'').length>=3&&w.en.replace(/^to /,'').length<=10);
  }
  wordPool = [...wordPool].sort(()=>Math.random()-.5);
  const SIZE = 14;
  const grid = Array.from({length:SIZE}, ()=>Array(SIZE).fill(''));
  const placed = [];
  const dirs = [[0,1],[1,0],[1,1],[-1,1]];

  function tryPlace(word){
    for(let t=0;t<60;t++){
      const [dr,dc] = dirs[Math.floor(Math.random()*dirs.length)];
      const r = Math.floor(Math.random()*SIZE);
      const c = Math.floor(Math.random()*SIZE);
      let ok = true;
      for(let i=0;i<word.length;i++){
        const nr=r+i*dr, nc=c+i*dc;
        if(nr<0||nr>=SIZE||nc<0||nc>=SIZE||(grid[nr][nc]&&grid[nr][nc]!==word[i])){ok=false;break;}
      }
      if(ok){
        for(let i=0;i<word.length;i++) grid[r+i*dr][c+i*dc]=word[i];
        placed.push({word, r, c, dr, dc});
        return true;
      }
    }
    return false;
  }

  const usedEntries = [];
  for(const wp of wordPool){
    const w = wp.en.replace(/^to /,'').toUpperCase();
    if(w.length<3||w.length>10||usedEntries.find(e=>e.word===w)) continue;
    if(tryPlace(w)) usedEntries.push({word:w, de:wp.de});
    if(usedEntries.length>=12) break;
  }
  const usedWords = usedEntries.map(e=>e.word);
  const wordMap = Object.fromEntries(usedEntries.map(e=>[e.word, e.de]));

  const ALPHA='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++)
    if(!grid[r][c]) grid[r][c]=ALPHA[Math.floor(Math.random()*26)];

  _wsState = {found:[], grid, words:usedWords, wordMap, placed, SIZE, selecting:false, selStart:null, selCells:[], startTime:null};
}

function renderWordSearch(topicId){
  topicId = topicId||_wsTopicId||'mixed';

  const s = _wsState;

    const inSel = s.selCells.some(([sr,sc])=>sr===r&&sc===c);
    const isFound = s.placed.filter(p=>s.found.includes(p.word)).some(p=>{
      for(let i=0;i<p.word.length;i++) if(p.r+i*p.dr===r&&p.c+i*p.dc===c) return true; return false;
    });
    return `width:2rem;height:2rem;line-height:2rem;text-align:center;font-size:.85rem;font-weight:700;cursor:pointer;border-radius:.3rem;user-select:none;` +
      (isFound?'background:#6EE7B7;color:#065F46;':inSel?'background:#BFDBFE;color:#1E40AF;':'background:#F8FAFC;color:#1E293B;');

  const gridPx = s.SIZE*32 + (s.SIZE-1)*2 + 6;
  return `<div class="space-y-4">
    <div style="display:flex;align-items:center;gap:1rem">
      <button onclick="go('spiele')" style="background:none;border:none;color:#3B82F6;cursor:pointer">${T('btn_back_games')}</button>

    <div style="max-width:${gridPx}px">
      ${pb(s.found.length/Math.max(1,s.words.length)*100,'#F59E0B')}

    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:.6rem;width:100%">
      <div style="max-width:max-content">
        <div style="display:inline-grid;grid-template-columns:repeat(${s.SIZE},2rem);gap:2px;background:#E2E8F0;padding:3px;border-radius:.5rem">
          ${s.grid.map((row,r)=>row.map((cell,c)=>`<div style="${cellStyle(r,c)}" id="ws-${r}-${c}" onclick="wsClickCell(${r},${c})">${cell}</div>`).join('')).join('')}
        </div>
        <div style="margin-top:.6rem;display:flex;gap:.5rem;flex-wrap:wrap;align-items:center">
          <button onclick="buildWordSearch(_wsTopicId);go('wordsearch',_wsTopicId)" style="background:#EF4444;color:#fff;border:none;border-radius:.5rem;padding:.4rem .8rem;font-size:.82rem;cursor:pointer">${T('mem_new')}</button>
          <select onchange="buildWordSearch(this.value);go('wordsearch',this.value)" style="padding:.35rem .6rem;border-radius:.5rem;font-size:.8rem;border:1px solid #E2E8F0;background:#fff;cursor:pointer">
